<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>Firma Digital · Habitaris</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',Arial,sans-serif;background:#F0EEE9;min-height:100vh;color:#111}
.hdr{background:#111;padding:16px 20px;text-align:center}
.hdr img{height:28px}
.wrap{max-width:560px;margin:0 auto;padding:20px}
.card{background:#fff;border-radius:12px;padding:24px;box-shadow:0 1px 4px rgba(0,0,0,.06);margin-bottom:16px}
h2{font-size:18px;font-weight:700;margin-bottom:4px}
.sub{font-size:12px;color:#888;margin-bottom:20px}
.info{display:flex;flex-direction:column;gap:8px;margin-bottom:20px}
.info-row{display:flex;justify-content:space-between;font-size:13px;padding:8px 0;border-bottom:1px solid #F3F4F6}
.info-row:last-child{border:none}
.info-label{color:#888;font-weight:600;font-size:11px;text-transform:uppercase}
.info-value{color:#111;font-weight:500;text-align:right}
.pad-area{border:2px dashed #DDD;border-radius:12px;background:#FAFAFA;position:relative;margin-bottom:16px;touch-action:none}
.pad-area canvas{display:block;border-radius:10px;cursor:crosshair}
.pad-hint{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#CCC;font-size:14px;pointer-events:none}
.btn{width:100%;padding:14px;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;text-align:center;margin-bottom:8px}
.bk{background:#111;color:#fff}
.bg{background:#059669;color:#fff}
.ghost{background:none;color:#888;font-size:12px;padding:8px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;width:100%}
.spin{width:24px;height:24px;border:3px solid #E0E0E0;border-top-color:#111;border-radius:50%;animation:sp 1s linear infinite;margin:0 auto 8px}
@keyframes sp{to{transform:rotate(360deg)}}
.cert-box{background:#DCFCE7;border:1px solid #059669;border-radius:12px;padding:20px;text-align:center;margin-bottom:16px}
.cert-code{font-family:monospace;font-size:16px;font-weight:700;color:#059669;margin:8px 0}
.badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600}
.b-ok{background:#DCFCE7;color:#059669}
.b-wait{background:#FEF3C7;color:#D97706}
.legal{font-size:9px;color:#999;line-height:1.5;margin-top:16px;padding-top:12px;border-top:1px solid #F3F4F6}
.gps-info{font-size:10px;color:#888;background:#F5F5F5;border-radius:6px;padding:6px 10px;margin-bottom:12px}
</style>
</head>
<body>
<div class="hdr"><img src="/logo-habitaris-blanco.png" alt="Habitaris"/></div>
<div class="wrap" id="app"><div style="text-align:center;padding:40px"><div class="spin"></div></div></div>
<script>
(function(){
  var params = new URLSearchParams(window.location.search);
  var TOKEN = params.get("token") || "";
  var pending = null;
  var signatureData = null;
  var gps = null;
  var canvas, ctx, drawing = false, hasDrawn = false;

  function R(h){ document.getElementById("app").innerHTML = h; }

  // Request GPS
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
      function(p){ gps = {lat:p.coords.latitude, lng:p.coords.longitude}; },
      function(){},
      {enableHighAccuracy:true,timeout:15000}
    );
  }

  async function load() {
    if (!TOKEN) { R('<div class="card" style="text-align:center"><h2>Enlace invalido</h2><div class="sub">No se encontro un token de firma.</div></div>'); return; }
    try {
      var r = await fetch("/api/firma?token=" + TOKEN);
      var d = await r.json();
      if (!d.ok || !d.data) { R('<div class="card" style="text-align:center"><h2>Enlace invalido</h2><div class="sub">Este enlace no existe o ha expirado.</div></div>'); return; }
      pending = d.data;
      if (pending.status === "signed") { showAlreadySigned(); return; }
      if (pending.status === "expired") { R('<div class="card" style="text-align:center"><h2>Enlace expirado</h2><div class="sub">Este enlace ya no es valido. Solicita uno nuevo.</div></div>'); return; }
      showDocument();
    } catch(e) {
      R('<div class="card" style="text-align:center"><h2>Error</h2><div class="sub">' + e.message + '</div></div>');
    }
  }

  function showAlreadySigned() {
    R('<div class="card" style="text-align:center">'
      + '<div style="font-size:48px;margin-bottom:12px">✅</div>'
      + '<h2>Documento ya firmado</h2>'
      + '<div class="sub">Este documento ya fue firmado anteriormente.</div>'
      + '</div>');
  }

  function showDocument() {
    R('<div class="card">'
      + '<div style="text-align:center;margin-bottom:20px">'
      + '<div style="font-size:40px;margin-bottom:8px">📄</div>'
      + '<h2>' + pending.doc_title + '</h2>'
      + '<div class="sub">' + pending.doc_code + '</div></div>'
      + '<div class="info">'
      + '<div class="info-row"><span class="info-label">Documento</span><span class="info-value">' + pending.doc_code + '</span></div>'
      + '<div class="info-row"><span class="info-label">Firmante</span><span class="info-value">' + pending.signer_name + '</span></div>'
      + '<div class="info-row"><span class="info-label">Rol</span><span class="info-value">' + pending.signer_role + '</span></div>'
      + '<div class="info-row"><span class="info-label">Email</span><span class="info-value">' + (pending.signer_email||"") + '</span></div>'
      + '</div>'
      + '<div style="background:#EFF6FF;border:1px solid #1D4ED8;border-radius:8px;padding:14px;font-size:12px;color:#1E40AF;margin-bottom:20px">'
      + '<strong>Importante:</strong> Al firmar, acepta que ha leido y esta de acuerdo con el contenido del documento. '
      + 'Su firma tendra validez legal conforme a la Ley 527/1999 de Colombia y el Reglamento eIDAS de la UE.</div>'
      + '<button class="btn bk" onclick="APP.showPad()">Proceder a firmar →</button>'
      + '</div>');
  }

  function showPad() {
    R('<div class="card">'
      + '<h2 style="text-align:center">✍️ Su firma</h2>'
      + '<div class="sub" style="text-align:center">Firme con el dedo o el mouse dentro del recuadro</div>'
      + '<div class="pad-area" id="padArea"><canvas id="sigCanvas" width="500" height="200"></canvas><div class="pad-hint" id="padHint">Firme aqui</div></div>'
      + (gps ? '<div class="gps-info">📍 Ubicacion capturada: ' + gps.lat.toFixed(4) + ', ' + gps.lng.toFixed(4) + '</div>' : '<div class="gps-info">📍 GPS: obteniendo...</div>')
      + '<button class="btn bg" id="signBtn" onclick="APP.submitSign()" disabled>Firmar documento</button>'
      + '<button class="ghost" onclick="APP.clearPad()">Borrar firma</button>'
      + '<button class="ghost" onclick="APP.showDocument()">← Volver</button>'
      + '<div class="legal">Al firmar, se registrara: su direccion IP, dispositivo, ubicacion GPS y fecha/hora UTC. '
      + 'El documento firmado recibira un certificado unico verificable en suite.habitaris.co/verificar. '
      + 'Esta firma electronica tiene validez legal conforme a la Ley 527 de 1999 (Colombia) y al Reglamento (UE) 910/2014 (eIDAS).</div>'
      + '</div>');
    initCanvas();
  }

  function initCanvas() {
    canvas = document.getElementById("sigCanvas");
    ctx = canvas.getContext("2d");
    ctx.strokeStyle = "#111";
    ctx.lineWidth = 2.5;
    ctx.lineCap = "round";
    ctx.lineJoin = "round";
    hasDrawn = false;
    drawing = false;

    function getPos(e) {
      var rect = canvas.getBoundingClientRect();
      var x, y;
      if (e.touches) { x = e.touches[0].clientX - rect.left; y = e.touches[0].clientY - rect.top; }
      else { x = e.clientX - rect.left; y = e.clientY - rect.top; }
      var scaleX = canvas.width / rect.width;
      var scaleY = canvas.height / rect.height;
      return { x: x * scaleX, y: y * scaleY };
    }

    function start(e) { e.preventDefault(); drawing = true; var p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); }
    function move(e) { e.preventDefault(); if (!drawing) return; var p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); hasDrawn = true; document.getElementById("padHint").style.display = "none"; document.getElementById("signBtn").disabled = false; }
    function end(e) { e.preventDefault(); drawing = false; }

    canvas.addEventListener("mousedown", start);
    canvas.addEventListener("mousemove", move);
    canvas.addEventListener("mouseup", end);
    canvas.addEventListener("mouseleave", end);
    canvas.addEventListener("touchstart", start);
    canvas.addEventListener("touchmove", move);
    canvas.addEventListener("touchend", end);
  }

  function clearPad() {
    if (ctx) { ctx.clearRect(0, 0, canvas.width, canvas.height); hasDrawn = false; document.getElementById("padHint").style.display = "block"; document.getElementById("signBtn").disabled = true; }
  }

  async function submitSign() {
    if (!hasDrawn) { alert("Debe firmar antes de continuar."); return; }
    signatureData = canvas.toDataURL("image/png");

    R('<div class="card" style="text-align:center;padding:40px"><div class="spin"></div><div style="font-size:13px;color:#888">Procesando firma y generando certificado...</div></div>');

    try {
      var r = await fetch("/api/firma", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
          action: "sign",
          token: TOKEN,
          signature_image: signatureData,
          user_agent: navigator.userAgent.substring(0, 150),
          lat: gps ? gps.lat : null,
          lng: gps ? gps.lng : null,
          id_type: "CC",
          id_number: pending.signer_id_number || "",
        })
      });
      var d = await r.json();
      if (d.ok) {
        showSuccess(d);
      } else {
        R('<div class="card" style="text-align:center"><h2>Error</h2><div class="sub">' + (d.error||"Error desconocido") + '</div><button class="btn bk" onclick="APP.showPad()">Reintentar</button></div>');
      }
    } catch(e) {
      R('<div class="card" style="text-align:center"><h2>Error</h2><div class="sub">' + e.message + '</div><button class="btn bk" onclick="APP.showPad()">Reintentar</button></div>');
    }
  }

  function showSuccess(data) {
    R('<div class="card" style="text-align:center">'
      + '<div style="font-size:56px;margin-bottom:12px">✅</div>'
      + '<h2 style="color:#059669">Documento firmado</h2>'
      + '<div class="sub">Su firma ha sido registrada con exito</div>'
      + '<div class="cert-box">'
      + '<div style="font-size:10px;color:#059669;font-weight:600;letter-spacing:1px">CERTIFICADO DE FIRMA DIGITAL</div>'
      + '<div class="cert-code">' + data.certificate_code + '</div>'
      + '<div style="font-size:11px;color:#666">Verificable en:</div>'
      + '<div style="font-size:11px;color:#1D4ED8;word-break:break-all">' + data.verification_url + '</div>'
      + '</div>'
      + '<div style="font-size:12px;color:#888;margin-bottom:16px">'
      + '<strong>Documento:</strong> ' + pending.doc_code + '<br/>'
      + '<strong>Firmante:</strong> ' + pending.signer_name + '<br/>'
      + '<strong>Fecha:</strong> ' + new Date(data.signed_at).toLocaleString("es-CO") + '<br/>'
      + '</div>'
      + '<div class="legal">Este certificado acredita que el firmante ha suscrito el documento de forma electronica. '
      + 'La firma incluye: hash SHA-256 del documento, direccion IP, dispositivo, ubicacion GPS y marca temporal UTC. '
      + 'Cualquier persona puede verificar la autenticidad en la URL indicada. '
      + 'Validez legal: Ley 527/1999 (Colombia) · Reglamento (UE) 910/2014 (eIDAS).</div>'
      + '</div>');
  }

  window.APP = { showPad:showPad, clearPad:clearPad, submitSign:submitSign, showDocument:showDocument };
  load();
})();
</script>
</body>
</html>
