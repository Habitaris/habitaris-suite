<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#111111"/>
<title>Fichar · Habitaris</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',Arial,sans-serif;background:#F0EEE9;min-height:100vh;color:#111}
.hdr{background:#111;padding:16px 20px;text-align:center}
.hdr img{height:28px}
.hdr .cc{font-size:9px;color:rgba(255,255,255,.35);letter-spacing:2px;margin-top:4px;text-transform:uppercase}
.wrap{max-width:420px;margin:0 auto;padding:20px}
.card{background:#fff;border-radius:12px;padding:24px;box-shadow:0 1px 4px rgba(0,0,0,.06);margin-bottom:16px}
h2{font-size:18px;font-weight:700;margin-bottom:4px}
.sub{font-size:12px;color:#888;margin-bottom:20px}
.list{max-height:300px;overflow-y:auto;border:1px solid #E0E0E0;border-radius:8px}
.item{padding:14px 16px;cursor:pointer;border-bottom:1px solid #eee;font-size:14px;font-weight:500}
.item:last-child{border-bottom:none}
.item:active{background:#EFF6FF}
.dots{display:flex;justify-content:center;gap:12px;margin-bottom:16px}
.dot{width:14px;height:14px;border-radius:50%;background:#E0E0E0}
.dot.on{background:#1D4ED8}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;max-width:200px;margin:0 auto}
.key{padding:14px;font-size:18px;font-weight:600;border:1px solid #E0E0E0;border-radius:8px;background:#F5F5F5;cursor:pointer;text-align:center;font-family:'DM Sans',sans-serif;-webkit-user-select:none}
.key:active{background:#ddd}
.key.del{background:#FEE2E2;color:#DC2626}
.err{color:#DC2626;font-size:12px;text-align:center;margin-bottom:12px}
.btn{width:100%;padding:14px;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;text-align:center;margin-bottom:8px}
.bk{background:#111;color:#fff}
.bg{background:#059669;color:#fff}
.br{background:#DC2626;color:#fff}
.ghost{background:none;color:#888;font-size:12px;padding:8px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;width:100%}
.act{padding:16px;border-radius:10px;border:1px solid #E0E0E0;background:#fff;cursor:pointer;display:flex;align-items:center;gap:12px;font-size:14px;font-weight:500;font-family:'DM Sans',sans-serif;width:100%;margin-bottom:10px}
.act:active{background:#F5F5F5}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600}
.b-g{background:#DCFCE7;color:#059669}
.b-a{background:#FEF3C7;color:#D97706}
.b-r{background:#FEE2E2;color:#DC2626}
.selfie{position:relative;border-radius:8px;overflow:hidden;background:#000;aspect-ratio:4/3;margin-bottom:16px}
.selfie video,.selfie img{width:100%;height:100%;object-fit:cover;display:block}
.snap{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);background:rgba(255,255,255,.9);border:none;border-radius:50%;width:56px;height:56px;font-size:24px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.spin{width:24px;height:24px;border:3px solid #E0E0E0;border-top-color:#1D4ED8;border-radius:50%;animation:sp 1s linear infinite;margin:0 auto 8px}
@keyframes sp{to{transform:rotate(360deg)}}
.fg{margin-bottom:16px}
.fg label{font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;display:block}
.fg select,.fg input,.fg textarea{width:100%;padding:12px 14px;border:1px solid #E0E0E0;border-radius:8px;font-size:14px;font-family:'DM Sans',sans-serif;background:#fff;color:#111}
.fg textarea{resize:vertical;min-height:80px}
.hi{padding:12px 0;border-bottom:1px solid #F3F4F6;font-size:12px}
.hi:last-child{border:none}
.gps-ok{background:#DCFCE7;border:1px solid #059669;border-radius:8px;padding:10px;font-size:11px;color:#059669;margin-bottom:12px}
.gps-no{background:#FEF3C7;border:1px solid #D97706;border-radius:8px;padding:10px;font-size:11px;color:#D97706;margin-bottom:12px}
.dev{background:#F5F5F5;border-radius:6px;padding:6px 10px;font-size:8px;color:#aaa;text-align:center;margin-top:8px}
</style>
</head>
<body>
<div class="hdr">
  <img src="/logo-habitaris-blanco.jpg" alt="Habitaris"/>
  <div class="cc" id="ccLabel"></div>
</div>
<div class="wrap" id="app"><div style="text-align:center;padding:40px"><div class="spin"></div></div></div>
<script>
(function(){
  var P = new URLSearchParams(window.location.search);
  var EMP_ID = P.get("emp") || "";
  var emps = [], me = null, att = [], nov = [];
  var gps = null, gpsE = null, pin = "", pinE = false, foto = null, vs = null;
  var ccInput = "", ccErr = false;
  var devInfo = (navigator.userAgent||"").substring(0,100);

  document.getElementById("ccLabel").textContent = "Control de asistencia";

  var $ = document.getElementById.bind(document);
  function R(h){ $("app").innerHTML = '<div class="wrap">'+h+'</div>'; }
  function ft(ts){ return new Date(ts).toLocaleTimeString("es-ES",{hour:"2-digit",minute:"2-digit"}); }
  function today(){ var d=new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }

  // Try GPS in background always
  function tryGPS(){
    if(navigator.geolocation){
      navigator.geolocation.getCurrentPosition(
        function(p){ gps={lat:p.coords.latitude,lng:p.coords.longitude,prec:Math.round(p.coords.accuracy)}; },
        function(e){ gpsE=e.message; },
        {enableHighAccuracy:true,timeout:30000,maximumAge:0}
      );
    }
  }
  tryGPS();

  // API calls
  async function loadEmps(){
    try{
      var url = EMP_ID ? "/api/employees-public?emp="+EMP_ID : "/api/employees-public";
      var r=await fetch(url); var d=await r.json(); emps=d.data||[];
    }catch(e){ emps=[]; }
    // If emp= param provided and found, skip to PIN
    if(EMP_ID && emps.length===1){
      me = emps[0];
      pin=""; pinE=false;
      step2();
    } else {
      stepCC();
    }
  }
  async function loadAtt(){
    try{ var r=await fetch("/api/attendance?fecha="+today()+"&employee_id="+me.id); var d=await r.json(); att=d.data||[]; }catch(e){ att=[]; }
  }
  async function loadNov(){
    try{ var r=await fetch("/api/novelties?employee_id="+me.id); var d=await r.json(); nov=d.data||[]; }catch(e){ nov=[]; }
  }

  function lastTipo(){
    var regs=att.filter(function(a){return a.employee_id===me.id&&a.fecha===today();});
    return regs.length?regs[regs.length-1].tipo:null;
  }

  // STEP CC - Enter CC number
  function stepCC(){
    R('<div class="card"><div style="text-align:center;font-size:40px;margin-bottom:12px">👋</div>'
      +'<h2 style="text-align:center">Control de asistencia</h2>'
      +'<div class="sub" style="text-align:center">Ingresa tu número de cédula</div>'
      +(ccErr?'<div class="err">Cédula no encontrada. Verifica el número.</div>':'')
      +'<div style="margin:16px 0"><input id="ccField" type="tel" placeholder="Tu número de cédula" value="'+ccInput+'" style="width:100%;padding:14px;border:1px solid '+(ccErr?'#DC2626':'#E0E0E0')+';border-radius:8px;font-size:18px;font-family:\'DM Mono\',monospace;text-align:center;letter-spacing:2px" onkeypress="if(event.key===\'Enter\')APP.buscarCC()"/></div>'
      +'<button class="btn bk" onclick="APP.buscarCC()">Continuar →</button>'
      +'<div style="text-align:center;margin-top:12px;font-size:10px;color:#aaa">PIN: últimos 4 dígitos de tu cédula</div>'
      +'</div>');
    setTimeout(function(){var f=document.getElementById("ccField");if(f)f.focus();},100);
  }

  function buscarCC(){
    var field=document.getElementById("ccField");
    if(!field)return;
    ccInput=field.value.replace(/\D/g,"");
    if(ccInput.length<4){ccErr=true;stepCC();return;}
    var found=emps.find(function(e){return(e.documento||"").replace(/\D/g,"")===ccInput;});
    if(!found){ccErr=true;stepCC();return;}
    me=found;ccErr=false;pin="";pinE=false;
    step2();
  }

  function pick(id){
    me=emps.find(function(e){return e.id===id;});
    if(!me)return;
    pin=""; pinE=false;
    step2();
  }

  // STEP 1 - Select name (fallback, kept for compatibility)
  function step1(){
    stepCC();
  }

  // STEP 2 - PIN
  var newPin1="",newPin2="";
  function step2(){
    var dots="";
    for(var i=0;i<4;i++) dots+='<div class="dot '+(i<pin.length?"on":"")+'"></div>';
    var keys=[1,2,3,4,5,6,7,8,9,"",0,"⌫"].map(function(k){
      if(k==="") return '<div></div>';
      if(k==="⌫") return '<div class="key del" onclick="APP.pk(\'del\')">⌫</div>';
      return '<div class="key" onclick="APP.pk(\''+k+'\')">'+k+'</div>';
    }).join("");
    R('<div class="card" style="text-align:center">'
      +'<div style="font-size:40px;margin-bottom:12px">🔢</div>'
      +'<h2>Hola, '+me.nombre.split(" ")[0]+'</h2>'
      +'<div class="sub">Introduce tu PIN'+(me.pin_changed?'':' (últimos 4 dígitos de tu cédula)')+'</div>'
      +'<div class="dots">'+dots+'</div>'
      +(pinE?'<div class="err">PIN incorrecto</div>':'')
      +'<div class="grid">'+keys+'</div>'
      +'<button class="ghost" onclick="APP.forgotPin()" style="margin-top:12px;color:#2563eb">¿Olvidaste tu PIN?</button>'
      +'<button class="ghost" onclick="APP.backToCC?APP.backToCC():APP.step1()">← Cambiar cédula</button>'
      +'</div>');
  }

  function pk(k){
    if(k==="del"){pin=pin.slice(0,-1);step2();return;}
    pin+=k;
    if(pin.length===4){
      if(pin===me.pin){
        pin="";pinE=false;
        // First access → force PIN change
        if(!me.pin_changed){
          stepChangePin("Crea tu PIN personal","Por seguridad, cambia tu PIN temporal por uno nuevo de 4 dígitos.");
        } else {
          Promise.all([loadAtt(),loadNov()]).then(home);
        }
      }
      else{pinE=true;pin="";step2();}
    } else step2();
  }

  // CHANGE PIN
  function stepChangePin(title,subtitle){
    newPin1="";newPin2="";
    renderNewPin(1,title,subtitle);
  }
  function renderNewPin(phase,title,subtitle){
    var p=phase===1?newPin1:newPin2;
    var dots="";for(var i=0;i<4;i++) dots+='<div class="dot '+(i<p.length?"on":"")+'"></div>';
    var keys=[1,2,3,4,5,6,7,8,9,"",0,"⌫"].map(function(k){
      if(k==="") return '<div></div>';
      if(k==="⌫") return '<div class="key del" onclick="APP.npk(\'del\','+phase+')">⌫</div>';
      return '<div class="key" onclick="APP.npk(\''+k+'\','+phase+')">'+k+'</div>';
    }).join("");
    R('<div class="card" style="text-align:center">'
      +'<div style="font-size:40px;margin-bottom:12px">'+(phase===1?'🔐':'✅')+'</div>'
      +'<h2>'+(title||"Nuevo PIN")+'</h2>'
      +'<div class="sub">'+(phase===1?(subtitle||"Elige 4 dígitos"):"Confirma tu nuevo PIN")+'</div>'
      +'<div class="dots">'+dots+'</div>'
      +'<div class="grid">'+keys+'</div>'
      +'</div>');
  }
  function npk(k,phase){
    if(phase===1){
      if(k==="del"){newPin1=newPin1.slice(0,-1);renderNewPin(1);return;}
      newPin1+=k;
      if(newPin1.length===4) renderNewPin(2);
      else renderNewPin(1);
    } else {
      if(k==="del"){newPin2=newPin2.slice(0,-1);renderNewPin(2);return;}
      newPin2+=k;
      if(newPin2.length===4){
        if(newPin1===newPin2){
          // Save new PIN
          R('<div class="card" style="text-align:center;padding:30px"><div class="spin"></div><div style="font-size:13px;color:#888;margin-top:8px">Guardando PIN...</div></div>');
          fetch("/api/employees-public",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({action:"change_pin",emp_id:me.id,new_pin:newPin1})})
            .then(function(r){return r.json();})
            .then(function(d){
              if(d.ok){
                me.pin=newPin1;me.pin_changed=true;
                R('<div class="card" style="text-align:center;padding:30px"><div style="font-size:40px;margin-bottom:12px">✅</div><h2>PIN actualizado</h2><div class="sub">Tu nuevo PIN está activo</div><button class="btn bk" onclick="Promise.all([APP.loadAtt(),APP.loadNov()]).then(APP.home)">Continuar</button></div>');
              } else { alert("Error: "+(d.error||"")); stepChangePin(); }
            }).catch(function(e){alert("Error: "+e.message);stepChangePin();});
        } else {
          newPin2="";
          R('<div class="card" style="text-align:center;padding:20px"><div class="err">Los PIN no coinciden</div><button class="btn bk" onclick="APP.stepChangePin()">Intentar de nuevo</button></div>');
        }
      } else renderNewPin(2);
    }
  }

  // FORGOT PIN
  function forgotPin(){
    if(!me||!me.email_masked){alert("No hay email registrado. Contacta a RRHH.");return;}
    R('<div class="card" style="text-align:center">'
      +'<div style="font-size:40px;margin-bottom:12px">📧</div>'
      +'<h2>Recuperar PIN</h2>'
      +'<div class="sub">Enviaremos un código de verificación a:</div>'
      +'<div style="font-size:16px;font-weight:700;margin:12px 0;font-family:monospace">'+me.email_masked+'</div>'
      +'<button class="btn bk" onclick="APP.sendRecoveryOTP()">Enviar código</button>'
      +'<button class="ghost" onclick="APP.step2()">← Volver</button>'
      +'</div>');
  }
  function sendRecoveryOTP(){
    R('<div class="card" style="text-align:center;padding:30px"><div class="spin"></div><div style="font-size:13px;color:#888;margin-top:8px">Enviando código...</div></div>');
    fetch("/api/employees-public",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({action:"send_otp",emp_id:me.id,purpose:"recovery"})})
      .then(function(r){return r.json();})
      .then(function(d){
        if(d.ok) stepVerifyOTP("recovery");
        else { alert("Error: "+(d.error||"No se pudo enviar")); step2(); }
      }).catch(function(e){alert("Error: "+e.message);step2();});
  }
  var otpInput="";
  function stepVerifyOTP(purpose){
    otpInput="";
    renderOTPInput(purpose);
  }
  function renderOTPInput(purpose){
    R('<div class="card" style="text-align:center">'
      +'<div style="font-size:40px;margin-bottom:12px">✉️</div>'
      +'<h2>Código enviado</h2>'
      +'<div class="sub">Revisa tu correo e introduce el código de 6 dígitos</div>'
      +'<div style="margin:16px 0"><input id="otpField" type="tel" maxlength="6" placeholder="000000" value="'+otpInput+'" style="width:200px;padding:14px;border:1px solid #E0E0E0;border-radius:8px;font-size:24px;font-family:monospace;text-align:center;letter-spacing:6px" oninput="APP.otpInput(this.value,\''+purpose+'\')"/></div>'
      +'<button class="ghost" onclick="APP.sendRecoveryOTP()">Reenviar código</button>'
      +'<button class="ghost" onclick="APP.step2()">← Cancelar</button>'
      +'</div>');
    setTimeout(function(){var f=document.getElementById("otpField");if(f)f.focus();},100);
  }
  function handleOTPInput(val,purpose){
    otpInput=val.replace(/\D/g,"");
    if(otpInput.length===6){
      R('<div class="card" style="text-align:center;padding:30px"><div class="spin"></div><div style="font-size:13px;color:#888;margin-top:8px">Verificando...</div></div>');
      fetch("/api/employees-public",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({action:"verify_otp",emp_id:me.id,code:otpInput})})
        .then(function(r){return r.json();})
        .then(function(d){
          if(d.ok){
            if(purpose==="recovery") stepChangePin("Nuevo PIN","El código fue verificado. Ahora crea tu PIN nuevo.");
            else if(purpose==="2fa") Promise.all([loadAtt(),loadNov()]).then(home);
          } else { alert("Código incorrecto o expirado"); stepVerifyOTP(purpose); }
        }).catch(function(e){alert("Error: "+e.message);stepVerifyOTP(purpose);});
    }
  }

  // HOME
  function home(){
    var lt=lastTipo(), isIn=lt==="entrada";
    var regs=att.filter(function(a){return a.employee_id===me.id;});
    var ent=regs.find(function(a){return a.tipo==="entrada";});
    var sal=regs.find(function(a){return a.tipo==="salida";});
    var st=!ent?"Sin fichar":isIn?"🟢 En servicio":"Jornada finalizada";
    var sc=!ent?"#D97706":isIn?"#059669":"#6B7280";
    var et=ent?ft(ent.timestamp):"–", sa=sal?ft(sal.timestamp):"–";
    var pend=nov.filter(function(n){return n.estado==="pendiente";}).length;
    var nb=pend?'<span class="badge b-a">'+pend+' pend.</span>':"";

    R('<div class="card">'
      +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">'
      +'<div><div style="font-size:16px;font-weight:700">'+me.nombre+'</div>'
      +'<div style="font-size:11px;color:#888">'+(me.cargo||"Empleado")+'</div></div>'
      +'<div style="font-size:12px;font-weight:600;color:'+sc+'">'+st+'</div></div>'
      +'<div style="display:flex;gap:8px;margin-bottom:16px">'
      +'<div style="flex:1;background:#F5F5F5;border-radius:8px;padding:12px;text-align:center">'
      +'<div style="font-size:10px;color:#888;margin-bottom:4px">ENTRADA</div>'
      +'<div style="font-size:18px;font-weight:700;color:#059669">'+et+'</div></div>'
      +'<div style="flex:1;background:#F5F5F5;border-radius:8px;padding:12px;text-align:center">'
      +'<div style="font-size:10px;color:#888;margin-bottom:4px">SALIDA</div>'
      +'<div style="font-size:18px;font-weight:700;color:#DC2626">'+sa+'</div></div></div>'
      +(!ent?'<button class="act" onclick="APP.fichaje(\'entrada\')"><span style="font-size:24px">🟢</span><div><div style="font-weight:700">Registrar entrada</div><div style="font-size:11px;color:#888">Selfie + GPS</div></div></button>':'')
      +(ent&&isIn?'<button class="act" onclick="APP.fichaje(\'salida\')"><span style="font-size:24px">🔴</span><div><div style="font-weight:700">Registrar salida</div><div style="font-size:11px;color:#888">Selfie + GPS</div></div></button>':'')
      +'<button class="act" onclick="APP.novForm()"><span style="font-size:24px">📝</span><div><div style="font-weight:700">Reportar novedad</div><div style="font-size:11px;color:#888">Permiso, ausencia '+nb+'</div></div></button>'
      +'<button class="act" onclick="APP.novList()"><span style="font-size:24px">📊</span><div><div style="font-weight:700">Mis novedades</div><div style="font-size:11px;color:#888">Estado de solicitudes</div></div></button>'
      +'</div>'
      +'<button class="ghost" onclick="APP.step1()">Cambiar persona</button>'
      +'<div class="dev">🔒 '+devInfo.substring(0,50)+'</div>');
  }

  // FICHAJE - Selfie
  function fichaje(tipo){
    foto=null;
    tryGPS(); // retry GPS
    R('<div class="card" style="text-align:center">'
      +'<h2>'+(tipo==="entrada"?"🟢 Entrada":"🔴 Salida")+' — Selfie</h2>'
      +'<div class="sub">'+me.nombre+' · '+new Date().toLocaleTimeString("es-ES",{hour:"2-digit",minute:"2-digit"})+'</div>'
      +'<div class="selfie"><video id="vid" autoplay playsinline muted></video>'
      +'<button class="snap" onclick="APP.snap(\''+tipo+'\')">📸</button></div>'
      +'<div style="font-size:11px;color:#888;margin-bottom:12px">Toca 📸 para capturar</div>'
      +'<button class="ghost" onclick="APP.stopCam();APP.home()">← Cancelar</button>'
      +'</div>');
    startCam();
  }

  function startCam(){
    navigator.mediaDevices.getUserMedia({video:{facingMode:"user",width:{ideal:640},height:{ideal:480}}})
    .then(function(s){
      vs=s;
      var v=document.getElementById("vid");
      if(v) v.srcObject=s;
    })
    .catch(function(e){
      R('<div class="card" style="text-align:center">'
        +'<div style="font-size:40px;margin-bottom:12px">📷</div>'
        +'<h2>Cámara no disponible</h2>'
        +'<div class="sub">'+e.message+'</div>'
        +'<div style="color:#DC2626;font-size:12px;margin-bottom:16px">Permite el acceso a la cámara en ajustes.</div>'
        +'<button class="btn bk" onclick="APP.home()">Volver</button>'
        +'</div>');
    });
  }

  function stopCam(){ if(vs){vs.getTracks().forEach(function(t){t.stop();});vs=null;} }

  function snap(tipo){
    var v=document.getElementById("vid");
    if(!v)return;
    var c=document.createElement("canvas");
    c.width=v.videoWidth||640; c.height=v.videoHeight||480;
    c.getContext("2d").drawImage(v,0,0);
    foto=c.toDataURL("image/jpeg",0.6);
    stopCam();
    confirm(tipo);
  }

  function confirm(tipo){
    var gpsH=gps
      ?'<div class="gps-ok">✅ GPS: '+gps.lat.toFixed(5)+', '+gps.lng.toFixed(5)+' (±'+gps.prec+'m)</div>'
      :'<div class="gps-no">⚠️ GPS no disponible'+(gpsE?' — '+gpsE:'')+'</div>';

    R('<div class="card" style="text-align:center">'
      +'<h2>'+(tipo==="entrada"?"🟢 Confirmar entrada":"🔴 Confirmar salida")+'</h2>'
      +'<div class="sub">'+me.nombre+' · '+new Date().toLocaleTimeString("es-ES",{hour:"2-digit",minute:"2-digit"})+'</div>'
      +(foto?'<img src="'+foto+'" style="width:100%;border-radius:8px;margin-bottom:12px"/>':'')
      +gpsH
      +'<button class="btn '+(tipo==="entrada"?"bg":"br")+'" onclick="APP.doFichaje(\''+tipo+'\')">'+(tipo==="entrada"?"✓ CONFIRMAR ENTRADA":"✓ CONFIRMAR SALIDA")+'</button>'
      +'<button class="ghost" onclick="APP.home()">← Cancelar</button>'
      +'</div>');
  }

  async function doFichaje(tipo){
    R('<div class="card" style="text-align:center;padding:40px"><div class="spin"></div><div style="font-size:13px;color:#888">Registrando...</div></div>');
    try{
      await fetch("/api/attendance",{
        method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          employee_id:me.id, employee_nombre:me.nombre, tipo:tipo,
          lat:gps?gps.lat:null, lng:gps?gps.lng:null, precision:gps?gps.prec:null,
          foto_url:foto, centro_costo:null, ot_id:null,
          gps_error:gps?null:(gpsE||"no disponible"), device_info:devInfo
        })
      });
    }catch(e){console.error(e);}
    await loadAtt();
    R('<div class="card" style="text-align:center;padding:40px">'
      +'<div style="font-size:56px;margin-bottom:16px">✅</div>'
      +'<h2 style="color:#059669">'+(tipo==="entrada"?"Entrada":"Salida")+' registrada</h2>'
      +'<div style="font-size:13px;color:#888;margin-bottom:16px">'+me.nombre+' · '+new Date().toLocaleTimeString("es-ES",{hour:"2-digit",minute:"2-digit"})+'</div>'
      +(gps?'<div style="font-size:11px;color:#888;margin-bottom:12px">📍 '+gps.lat.toFixed(4)+', '+gps.lng.toFixed(4)+' (±'+gps.prec+'m)</div>':'')
      +(foto?'<img src="'+foto+'" style="width:100px;height:100px;border-radius:50%;object-fit:cover;border:3px solid #059669;margin-bottom:16px"/>':'')
      +'<div class="dev">🔒 '+devInfo.substring(0,50)+'</div>'
      +'<button class="btn bk" style="margin-top:16px" onclick="APP.home()">Volver</button>'
      +'</div>');
  }

  // NOVEDADES - Form
  function novForm(){
    R('<div class="card">'
      +'<h2>📝 Nueva novedad</h2>'
      +'<div class="sub">Reportar permiso, ausencia u otra novedad</div>'
      +'<div class="fg"><label>Tipo *</label>'
      +'<select id="nT"><option value="permiso">🙋 Permiso</option><option value="vacaciones">🏖️ Vacaciones</option><option value="baja_medica">🏥 Baja médica</option><option value="horas_extra">⏰ Horas extra</option><option value="ausencia">❌ Ausencia</option><option value="otro">📌 Otro</option></select></div>'
      +'<div class="fg"><label>Fecha inicio *</label><input type="date" id="nFI" value="'+today()+'"/></div>'
      +'<div class="fg"><label>Fecha fin (opcional)</label><input type="date" id="nFF"/></div>'
      +'<div class="fg"><label>Motivo *</label><textarea id="nM" placeholder="Describe la novedad..."></textarea></div>'
      +'<div class="fg"><label>Adjunto (obligatorio para baja médica)</label><input type="file" id="nA" accept="image/*,.pdf" style="padding:10px;background:#F5F5F5"/></div>'
      +'<button class="btn bk" onclick="APP.novSend()">Enviar novedad →</button>'
      +'<button class="ghost" onclick="APP.home()">← Cancelar</button>'
      +'</div>');
  }

  async function novSend(){
    var tipo=document.getElementById("nT").value;
    var fi=document.getElementById("nFI").value;
    var ff=document.getElementById("nFF").value;
    var mot=document.getElementById("nM").value;
    var adj=document.getElementById("nA");
    if(!mot.trim()){alert("El motivo es obligatorio.");return;}
    if(tipo==="baja_medica"&&adj&&!adj.files.length){alert("Para baja médica el adjunto es obligatorio.");return;}
    var adjData=null;
    if(adj&&adj.files.length){
      adjData=await new Promise(function(res){var r=new FileReader();r.onload=function(){res(r.result);};r.readAsDataURL(adj.files[0]);});
    }
    R('<div class="card" style="text-align:center;padding:40px"><div class="spin"></div><div style="font-size:13px;color:#888">Enviando...</div></div>');
    try{
      await fetch("/api/novelties",{
        method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({employee_id:me.id,employee_nombre:me.nombre,tipo:tipo,fecha_inicio:fi,fecha_fin:ff||null,motivo:mot,adjunto_url:adjData,centro_costo:null,ot_id:null})
      });
    }catch(e){console.error(e);}
    await loadNov();
    R('<div class="card" style="text-align:center;padding:40px">'
      +'<div style="font-size:56px;margin-bottom:16px">📝</div>'
      +'<h2 style="color:#1D4ED8">Novedad enviada</h2>'
      +'<div style="font-size:13px;color:#888;margin-bottom:16px">Pendiente de aprobación</div>'
      +'<button class="btn bk" onclick="APP.home()">Volver</button>'
      +'</div>');
  }

  // NOVEDADES - List
  function novList(){
    var tipos={vacaciones:"🏖️ Vacaciones",permiso:"🙋 Permiso",baja_medica:"🏥 Incapacidad",horas_extra:"⏰ Horas extra",ausencia:"❌ Ausencia",otro:"📌 Otro"};
    var list=nov.map(function(n){
      var est=n.estado==="pendiente"?'<span class="badge b-a">⏳ Pendiente</span>':n.estado==="aprobada"?'<span class="badge b-g">✅ Aprobada</span>':'<span class="badge b-r">❌ Rechazada</span>';
      return '<div class="hi"><div style="display:flex;justify-content:space-between;align-items:start">'
        +'<div><div style="font-weight:600;font-size:13px">'+(tipos[n.tipo]||n.tipo)+'</div>'
        +'<div style="color:#888;font-size:11px">'+n.fecha_inicio+(n.fecha_fin?" → "+n.fecha_fin:"")+'</div>'
        +(n.motivo?'<div style="color:#888;font-size:11px;margin-top:2px">'+n.motivo.substring(0,60)+'</div>':'')
        +'</div><div>'+est+'</div></div></div>';
    }).join("");
    R('<div class="card">'
      +'<h2>📊 Mis novedades</h2>'
      +'<div class="sub">'+nov.length+' registro'+(nov.length!==1?"s":"")+'</div>'
      +(list||'<div style="text-align:center;padding:20px;color:#888;font-size:13px">No tienes novedades.</div>')
      +'<button class="ghost" onclick="APP.home()">← Volver</button>'
      +'</div>');
  }

  // Expose to global
  window.APP={pick:pick,pk:pk,step1:step1,step2:step2,home:home,fichaje:fichaje,snap:snap,doFichaje:doFichaje,stopCam:stopCam,novForm:novForm,novSend:novSend,novList:novList,buscarCC:buscarCC,backToCC:function(){me=null;ccInput="";ccErr=false;stepCC();},forgotPin:forgotPin,sendRecoveryOTP:sendRecoveryOTP,otpInput:handleOTPInput,npk:npk,stepChangePin:function(){stepChangePin();},loadAtt:loadAtt,loadNov:loadNov};

  // INIT
  loadEmps();
})();
</script>
</body>
</html>
