<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>Evaluaci&oacute;n Psicot&eacute;cnica · Habitaris</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',Arial,sans-serif;background:#F0EEE9;min-height:100vh;color:#111}
.hdr{background:#111;padding:16px 20px;text-align:center}
.hdr img{height:28px}
.wrap{max-width:650px;margin:0 auto;padding:20px}
.card{background:#fff;border-radius:12px;padding:24px;box-shadow:0 1px 4px rgba(0,0,0,.06);margin-bottom:16px}
h2{font-size:18px;font-weight:700;margin-bottom:4px}
.sub{font-size:12px;color:#888;margin-bottom:20px}
.q-card{border:1px solid #E0E0E0;border-radius:10px;padding:16px;margin-bottom:12px}
.q-card.answered{border-color:#059669;background:#FAFFF9}
.q-num{font-size:10px;font-weight:700;color:#888;letter-spacing:1px;margin-bottom:6px}
.q-text{font-size:13px;font-weight:600;color:#111;margin-bottom:12px;line-height:1.5}
.q-opts{display:flex;flex-direction:column;gap:6px}
.q-opt{padding:10px 14px;border:1px solid #E0E0E0;border-radius:8px;font-size:12px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:8px}
.q-opt:hover{border-color:#888;background:#F8F7F5}
.q-opt.sel{border-color:#059669;background:#DCFCE7;color:#059669;font-weight:600}
.q-opt .dot{width:16px;height:16px;border-radius:50%;border:2px solid #DDD;flex-shrink:0}
.q-opt.sel .dot{border-color:#059669;background:#059669}
.progress{display:flex;gap:4px;margin-bottom:20px}
.progress div{flex:1;height:4px;border-radius:2px;background:#E0E0E0}
.progress div.done{background:#059669}
.progress div.active{background:#111}
.btn{width:100%;padding:14px;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;text-align:center;margin-bottom:8px}
.bk{background:#111;color:#fff}
.bg{background:#059669;color:#fff}
.ghost{background:none;color:#888;font-size:12px;padding:8px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;width:100%}
.btn:disabled{opacity:.4;cursor:not-allowed}
.spin{width:24px;height:24px;border:3px solid #E0E0E0;border-top-color:#111;border-radius:50%;animation:sp 1s linear infinite;margin:0 auto 8px}
@keyframes sp{to{transform:rotate(360deg)}}
.flag{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600}
.f-v{background:#DCFCE7;color:#059669}
.f-a{background:#FEF3C7;color:#D97706}
.f-r{background:#FEE2E2;color:#DC2626}
.report-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #F3F4F6;font-size:13px}
.bar-bg{width:120px;height:8px;background:#E0E0E0;border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width .5s}
.section-badge{background:#111;color:#fff;padding:4px 12px;border-radius:4px;font-size:10px;font-weight:600;letter-spacing:1px;display:inline-block;margin-bottom:12px}
.timer{position:fixed;top:80px;right:20px;background:#111;color:#fff;padding:8px 14px;border-radius:8px;font-size:12px;font-weight:600;z-index:100}
.legal{font-size:9px;color:#999;line-height:1.5;margin-top:16px;padding-top:12px;border-top:1px solid #F3F4F6}
</style>
</head>
<body>
<div class="hdr"><img src="/logo-habitaris-blanco.png" alt="Habitaris"/></div>
<div class="wrap" id="app"><div style="text-align:center;padding:40px"><div class="spin"></div></div></div>
<script>
(function(){
  var P=new URLSearchParams(window.location.search);
  var HID=P.get("hiring_id")||"";
  var hiring=null,answers={},startTime=null,section=0;

  function R(h){document.getElementById("app").innerHTML=h;}

  // Questions by area
  var SECTIONS=[
    {id:"responsabilidad",label:"Responsabilidad y compromiso",icon:"\ud83c\udfaf",questions:[
      {id:"r1",text:"Cuando le asignan una tarea que no le corresponde directamente, usted:",opts:[
        {t:"La realiza sin problema, entendiendo que es parte del trabajo en equipo",v:4},
        {t:"La hace pero le comenta a su jefe que no es su responsabilidad",v:3},
        {t:"La hace a medias porque no es su obligaci\u00f3n",v:1},
        {t:"Se niega porque no est\u00e1 en sus funciones",v:0}]},
      {id:"r2",text:"Si nota que un \u00e1rea com\u00fan est\u00e1 desordenada fuera de su horario de limpieza:",opts:[
        {t:"La organiza inmediatamente sin que nadie se lo pida",v:4},
        {t:"Toma nota para hacerlo en su pr\u00f3ximo turno",v:3},
        {t:"Solo lo har\u00eda si alguien se lo pide",v:1},
        {t:"No es su turno, no le corresponde",v:0}]},
      {id:"r3",text:"Respecto a la puntualidad en su trabajo anterior:",opts:[
        {t:"Siempre llegaba antes de la hora establecida",v:4},
        {t:"Llegaba puntual la mayor\u00eda de las veces",v:3},
        {t:"A veces llegaba tarde por situaciones personales",v:1},
        {t:"La puntualidad no era algo que controlaran mucho",v:0}]},
      {id:"r4",text:"Si se da cuenta de que cometi\u00f3 un error en su trabajo:",opts:[
        {t:"Lo reporta inmediatamente y lo corrige",v:4},
        {t:"Intenta corregirlo solo y luego informa",v:3},
        {t:"Espera a ver si alguien lo nota",v:1},
        {t:"Lo deja as\u00ed, no es tan grave",v:0}]}
    ]},
    {id:"servicio",label:"Orientaci\u00f3n al servicio",icon:"\ud83e\udd1d",questions:[
      {id:"s1",text:"Un compa\u00f1ero le pide un caf\u00e9 cuando usted est\u00e1 ocupado con otra tarea:",opts:[
        {t:"Le atiende amablemente y le dice que se lo lleva en unos minutos",v:4},
        {t:"Le dice que en cuanto termine lo que est\u00e1 haciendo se lo prepara",v:3},
        {t:"Le indica d\u00f3nde est\u00e1n las cosas para que se lo prepare \u00e9l mismo",v:1},
        {t:"Le dice que est\u00e1 ocupado",v:0}]},
      {id:"s2",text:"Un visitante le pregunta por una direcci\u00f3n dentro de la oficina:",opts:[
        {t:"Lo acompa\u00f1a personalmente hasta el lugar",v:4},
        {t:"Le explica detalladamente c\u00f3mo llegar",v:3},
        {t:"Le se\u00f1ala la direcci\u00f3n general",v:1},
        {t:"Le dice que pregunte en recepci\u00f3n",v:0}]},
      {id:"s3",text:"Cuando prepara alimentos o bebidas para el equipo:",opts:[
        {t:"Se asegura de que todo est\u00e9 impecable y bien presentado",v:4},
        {t:"Cumple con lo b\u00e1sico de higiene y presentaci\u00f3n",v:3},
        {t:"Lo prepara r\u00e1pido sin fijarse mucho en detalles",v:1},
        {t:"Solo lo hace si se lo piden expresamente",v:0}]},
      {id:"s4",text:"Si alguien se queja del servicio que usted presta:",opts:[
        {t:"Escucha atentamente, se disculpa y busca mejorar",v:4},
        {t:"Acepta la queja y trata de corregir",v:3},
        {t:"Se siente mal pero no dice nada",v:1},
        {t:"Piensa que la persona est\u00e1 exagerando",v:0}]}
    ]},
    {id:"instrucciones",label:"Seguimiento de instrucciones",icon:"\ud83d\udccb",questions:[
      {id:"i1",text:"Cuando recibe instrucciones nuevas sobre c\u00f3mo hacer una tarea:",opts:[
        {t:"Las sigue al pie de la letra y pregunta si tiene dudas",v:4},
        {t:"Las sigue pero adapta seg\u00fan su experiencia",v:3},
        {t:"Las lee pero prefiere hacerlo como siempre",v:1},
        {t:"No les presta mucha atenci\u00f3n si ya sabe hacer la tarea",v:0}]},
      {id:"i2",text:"Le dan un protocolo de limpieza con pasos espec\u00edficos:",opts:[
        {t:"Lo sigue exactamente en el orden indicado",v:4},
        {t:"Lo sigue en general pero cambia el orden si le parece m\u00e1s eficiente",v:3},
        {t:"Usa su propio m\u00e9todo que le ha funcionado siempre",v:1},
        {t:"Los protocolos son solo una gu\u00eda, no hay que seguirlos al detalle",v:0}]},
      {id:"i3",text:"Si su jefe le pide hacer algo que usted cree que se puede hacer mejor de otra forma:",opts:[
        {t:"Lo hace como le piden y despu\u00e9s sugiere su idea respetuosamente",v:4},
        {t:"Le comenta su idea antes de empezar",v:3},
        {t:"Lo hace a su manera porque sabe que funciona mejor",v:1},
        {t:"Discute hasta que acepten su forma",v:0}]},
      {id:"i4",text:"Respecto al uso de elementos de protecci\u00f3n personal (guantes, tapabocas):",opts:[
        {t:"Siempre los usa seg\u00fan el protocolo establecido",v:4},
        {t:"Los usa la mayor\u00eda del tiempo",v:3},
        {t:"Solo cuando alguien est\u00e1 supervisando",v:1},
        {t:"No los usa porque son inc\u00f3modos",v:0}]}
    ]},
    {id:"honestidad",label:"Honestidad y confiabilidad",icon:"\ud83d\udd10",questions:[
      {id:"h1",text:"Encuentra dinero en el piso de la oficina:",opts:[
        {t:"Lo entrega inmediatamente a su jefe o administraci\u00f3n",v:4},
        {t:"Pregunta si alguien lo perdi\u00f3",v:3},
        {t:"Lo guarda por si alguien lo reclama",v:1},
        {t:"No es mucho, nadie se va a dar cuenta",v:0}]},
      {id:"h2",text:"Se da cuenta de que un compa\u00f1ero est\u00e1 tomando insumos de la empresa para uso personal:",opts:[
        {t:"Lo reporta a su jefe de manera discreta",v:4},
        {t:"Le comenta al compa\u00f1ero que eso no est\u00e1 bien",v:3},
        {t:"No dice nada para no tener problemas",v:1},
        {t:"Todos lo hacen, no es para tanto",v:0}]},
      {id:"h3",text:"Le confian las llaves del lugar de trabajo:",opts:[
        {t:"Es una responsabilidad que tomo con total seriedad",v:4},
        {t:"Las cuido pero a veces las dejo en mi bolso sin revisar",v:2},
        {t:"Las tengo pero no le doy tanta importancia",v:1},
        {t:"Prefiero no tener esa responsabilidad",v:0}]},
      {id:"h4",text:"Si no puede asistir al trabajo un d\u00eda:",opts:[
        {t:"Aviso con la mayor anticipaci\u00f3n posible y busco soluci\u00f3n",v:4},
        {t:"Llamo el mismo d\u00eda temprano para avisar",v:3},
        {t:"Aviso por mensaje de texto",v:1},
        {t:"A veces simplemente no voy",v:0}]}
    ]},
    {id:"estabilidad",label:"Estabilidad emocional",icon:"\ud83e\udde0",questions:[
      {id:"e1",text:"Cuando tiene un d\u00eda dif\u00edcil en lo personal:",opts:[
        {t:"Separo lo personal de lo laboral y cumplo mis funciones",v:4},
        {t:"Me cuesta un poco pero intento que no afecte mi trabajo",v:3},
        {t:"Se nota en mi estado de \u00e1nimo y rendimiento",v:1},
        {t:"Prefiero no ir a trabajar esos d\u00edas",v:0}]},
      {id:"e2",text:"Si recibe una cr\u00edtica sobre su trabajo:",opts:[
        {t:"La tomo como oportunidad de mejora",v:4},
        {t:"Me molesta un poco pero la acepto",v:3},
        {t:"Me afecta bastante durante el d\u00eda",v:1},
        {t:"Me parece injusto y me enojo",v:0}]},
      {id:"e3",text:"Cuando hay mucho trabajo y presi\u00f3n:",opts:[
        {t:"Me organizo, priorizo y mantengo la calma",v:4},
        {t:"Me estreso pero logro cumplir",v:3},
        {t:"Me bloqueo y no s\u00e9 por d\u00f3nde empezar",v:1},
        {t:"Me frustro y quiero irme",v:0}]},
      {id:"e4",text:"\u00bfC\u00f3mo describir\u00eda su estado de \u00e1nimo habitual?",opts:[
        {t:"Tranquilo/a y positivo/a la mayor parte del tiempo",v:4},
        {t:"Estable con altibajos normales",v:3},
        {t:"Variable, depende mucho del d\u00eda",v:1},
        {t:"Frecuentemente estresado/a o preocupado/a",v:0}]}
    ]},
    {id:"equipo",label:"Trabajo en equipo",icon:"\ud83d\udc65",questions:[
      {id:"t1",text:"Cuando un compa\u00f1ero necesita ayuda con su trabajo:",opts:[
        {t:"Le ayudo sin dudar, el trabajo es de todos",v:4},
        {t:"Le ayudo si ya termin\u00e9 lo m\u00edo",v:3},
        {t:"Solo si mi jefe me lo pide",v:1},
        {t:"Cada uno debe hacer lo suyo",v:0}]},
      {id:"t2",text:"En un equipo de trabajo, usted prefiere:",opts:[
        {t:"Colaborar y apoyar donde se necesite",v:4},
        {t:"Hacer mi parte bien y coordinar con los dem\u00e1s",v:3},
        {t:"Trabajar solo/a en mi \u00e1rea",v:1},
        {t:"Que me digan exactamente qu\u00e9 hacer y ya",v:0}]},
      {id:"t3",text:"Si hay un desacuerdo con un compa\u00f1ero sobre c\u00f3mo hacer algo:",opts:[
        {t:"Dialogamos y buscamos la mejor soluci\u00f3n juntos",v:4},
        {t:"Cada uno hace lo suyo y ya",v:2},
        {t:"Cedo para evitar conflictos",v:1},
        {t:"Insisto en mi forma porque s\u00e9 que funciona",v:0}]},
      {id:"t4",text:"Respecto a compartir conocimientos con compa\u00f1eros nuevos:",opts:[
        {t:"Me gusta ense\u00f1arles y ayudarles a adaptarse",v:4},
        {t:"Les explico si me preguntan",v:3},
        {t:"Que aprendan solos como yo lo hice",v:0},
        {t:"No me corresponde capacitar a nadie",v:0}]}
    ]},
    {id:"sst",label:"Seguridad y salud en el trabajo",icon:"\ud83e\uddba",questions:[
      {id:"ss1",text:"Cuando le entregan elementos de protecci\u00f3n personal (guantes, tapabocas, etc.):",opts:[
        {t:"Los uso siempre que la tarea lo requiera, sin excepci\u00f3n",v:4},
        {t:"Los uso la mayor\u00eda del tiempo",v:3},
        {t:"Solo los uso cuando hay supervisi\u00f3n",v:1},
        {t:"No me gustan, son inc\u00f3modos",v:0}]},
      {id:"ss2",text:"Si identifica un riesgo o peligro en su \u00e1rea de trabajo:",opts:[
        {t:"Lo reporto inmediatamente y tomo medidas para evitar un accidente",v:4},
        {t:"Lo reporto cuando puedo",v:3},
        {t:"Tengo cuidado yo pero no lo reporto",v:1},
        {t:"Si no me ha pasado nada, no es tan grave",v:0}]},
      {id:"ss3",text:"Respecto a las capacitaciones de seguridad y salud en el trabajo:",opts:[
        {t:"Asisto siempre y aplico lo aprendido",v:4},
        {t:"Asisto cuando me toca y presto atenci\u00f3n",v:3},
        {t:"Asisto pero no les veo mucha utilidad",v:1},
        {t:"Son una p\u00e9rdida de tiempo",v:0}]},
      {id:"ss4",text:"Si sufre un accidente o incidente leve en el trabajo:",opts:[
        {t:"Lo reporto inmediatamente aunque parezca menor",v:4},
        {t:"Lo reporto solo si me duele o es visible",v:2},
        {t:"No lo reporto para no causar problemas",v:1},
        {t:"Los accidentes leves son normales, no hay que reportar todo",v:0}]}
    ]}
  ];

  var allQ=[];SECTIONS.forEach(function(s,si){s.questions.forEach(function(q,qi){allQ.push({...q,section:s.id,sectionIdx:si});});});
  var totalQ=allQ.length;

  async function load(){
    if(!HID){R('<div class="card" style="text-align:center"><h2>Enlace inv\u00e1lido</h2></div>');return;}
    try{
      var r=await fetch("/api/hiring?id="+HID);var d=await r.json();
      if(!d.ok){R('<div class="card"><h2>No encontrado</h2></div>');return;}
      hiring=d.data;
      // Check if already done
      var r2=await fetch("/api/psicotecnico?hiring_id="+HID);var d2=await r2.json();
      if(d2.ok&&d2.data){showReport(d2.data);return;}
      showIntro();
    }catch(e){R('<div class="card"><h2>Error</h2><div class="sub">'+e.message+'</div></div>');}
  }

  function showIntro(){
    R('<div class="card" style="text-align:center">'
      +'<div style="font-size:48px;margin-bottom:12px">\ud83e\udde0</div>'
      +'<h2>Evaluaci\u00f3n psicot\u00e9cnica</h2>'
      +'<div class="sub">'+hiring.cargo+'</div>'
      +'<div style="text-align:left;background:#F8F7F5;border-radius:8px;padding:16px;margin:16px 0;font-size:12px;line-height:1.8;color:#555">'
      +'<strong>Instrucciones:</strong><br/>'
      +'\u2022 Esta evaluaci\u00f3n consta de '+totalQ+' preguntas en 6 \u00e1reas<br/>'
      +'\u2022 No hay respuestas correctas o incorrectas<br/>'
      +'\u2022 Responda con honestidad seg\u00fan su forma habitual de actuar<br/>'
      +'\u2022 Tiempo estimado: 15-20 minutos<br/>'
      +'\u2022 No puede retroceder una vez avanzada la secci\u00f3n</div>'
      +'<button class="btn bk" onclick="APP.start()">Comenzar evaluaci\u00f3n \u2192</button>'
      +'<div class="legal">Esta evaluaci\u00f3n es confidencial y ser\u00e1 revisada \u00fanicamente por el \u00e1rea de RRHH de HABITARIS SAS.</div>'
      +'</div>');
  }

  function start(){startTime=Date.now();section=0;showSection();}

  function showSection(){
    var sec=SECTIONS[section];
    var prog='<div class="progress">';
    for(var i=0;i<SECTIONS.length;i++) prog+='<div class="'+(i<section?"done":i===section?"active":"")+'"></div>';
    prog+='</div>';

    var qs=sec.questions.map(function(q,qi){
      var sel=answers[q.id];
      return '<div class="q-card'+(sel!==undefined?" answered":"")+'">'
        +'<div class="q-num">PREGUNTA '+(qi+1)+' DE '+sec.questions.length+'</div>'
        +'<div class="q-text">'+q.text+'</div>'
        +'<div class="q-opts">'
        +q.opts.map(function(o,oi){
          return '<div class="q-opt'+(sel===oi?" sel":"")+'" onclick="APP.answer(\''+q.id+'\','+oi+','+o.v+')">'
            +'<div class="dot"></div>'+o.t+'</div>';
        }).join('')
        +'</div></div>';
    }).join('');

    var allAnswered=sec.questions.every(function(q){return answers[q.id]!==undefined;});

    R(prog
      +'<div class="timer">\u23f1 '+(section+1)+'/'+SECTIONS.length+'</div>'
      +'<div class="card">'
      +'<div class="section-badge">SECCI\u00d3N '+(section+1)+' DE '+SECTIONS.length+'</div>'
      +'<h2>'+sec.icon+' '+sec.label+'</h2>'
      +'<div class="sub">Seleccione la opci\u00f3n que mejor describa su forma de actuar</div>'
      +qs
      +'<button class="btn bk" id="nextBtn" '+(allAnswered?"":"disabled")
      +' onclick="APP.nextSection()">'+(section<SECTIONS.length-1?"Siguiente secci\u00f3n \u2192":"Finalizar evaluaci\u00f3n")+'</button>'
      +(section>0?'<button class="ghost" onclick="APP.prevSection()">\u2190 Secci\u00f3n anterior</button>':'')
      +'</div>');
  }

  function answer(qid,oidx,val){answers[qid]={idx:oidx,val:val};showSection();}
  function prevSection(){if(section>0){section--;showSection();}}

  function nextSection(){
    var sec=SECTIONS[section];
    if(!sec.questions.every(function(q){return answers[q.id]!==undefined;})){alert("Responda todas las preguntas.");return;}
    if(section<SECTIONS.length-1){section++;showSection();}
    else{submitTest();}
  }

  async function submitTest(){
    R('<div class="card" style="text-align:center;padding:40px"><div class="spin"></div><div style="font-size:13px;color:#888">Procesando resultados...</div></div>');

    var dur=Math.round((Date.now()-startTime)/60000);
    var scores={};
    SECTIONS.forEach(function(sec){
      var total=0,max=sec.questions.length*4;
      sec.questions.forEach(function(q){total+=answers[q.id].val;});
      scores[sec.id]=Math.round(total/max*100);
    });

    var totalScore=Math.round(Object.values(scores).reduce(function(a,b){return a+b;},0)/SECTIONS.length);

    function flag(score){return score>=75?"verde":score>=50?"amarillo":"rojo";}
    var flags={};Object.keys(scores).forEach(function(k){flags[k]=flag(scores[k]);});
    var flagGlobal=flag(totalScore);

    var apto=totalScore>=60&&!Object.values(flags).some(function(f){return f==="rojo";});

    var concepto=apto
      ?(totalScore>=80?"Candidato con excelente perfil psicot\u00e9cnico para el cargo. Demuestra altos niveles de responsabilidad, orientaci\u00f3n al servicio y estabilidad emocional."
        :"Candidato apto para el cargo. Presenta un perfil adecuado con algunas \u00e1reas de mejora que pueden desarrollarse con acompa\u00f1amiento.")
      :(totalScore>=40?"Candidato con perfil que requiere atenci\u00f3n en \u00e1reas cr\u00edticas. Se recomienda evaluaci\u00f3n complementaria antes de proceder."
        :"Candidato no recomendado para el cargo en este momento. El perfil presenta riesgos significativos en \u00e1reas clave.");

    var recs=[];
    if(flags.responsabilidad!=="verde") recs.push("Reforzar compromiso y sentido de responsabilidad mediante acompa\u00f1amiento directo.");
    if(flags.servicio!=="verde") recs.push("Desarrollar habilidades de atenci\u00f3n al cliente interno y orientaci\u00f3n al servicio.");
    if(flags.instrucciones!=="verde") recs.push("Supervisar el cumplimiento de protocolos y procedimientos establecidos.");
    if(flags.honestidad!=="verde") recs.push("Fortalecer la confianza mediante seguimiento cercano y pol\u00edticas claras.");
    if(flags.estabilidad!=="verde") recs.push("Considerar programa de bienestar y apoyo emocional.");
    if(flags.equipo!=="verde") recs.push("Fomentar actividades de integraci\u00f3n y trabajo colaborativo.");
    if(flags.sst!=="verde") recs.push("Reforzar capacitaci\u00f3n en seguridad y salud en el trabajo. Supervisar uso de EPP y reporte de incidentes.");

    var result={
      hiring_id:HID,
      candidato_nombre:hiring.candidato_nombre,
      cargo:hiring.cargo,
      score_responsabilidad:scores.responsabilidad,
      score_servicio:scores.servicio,
      score_instrucciones:scores.instrucciones,
      score_honestidad:scores.honestidad,
      score_estabilidad:scores.estabilidad,
      score_equipo:scores.equipo,
      score_sst:scores.sst,
      score_total:totalScore,
      flag_responsabilidad:flags.responsabilidad,
      flag_servicio:flags.servicio,
      flag_instrucciones:flags.instrucciones,
      flag_honestidad:flags.honestidad,
      flag_estabilidad:flags.estabilidad,
      flag_equipo:flags.equipo,
      flag_sst:flags.sst,
      flag_global:flagGlobal,
      concepto:concepto,
      recomendaciones:recs.join(" | "),
      apto:apto,
      respuestas:answers,
      duracion_minutos:dur,
      ip_address:""
    };

    try{
      var r=await fetch("/api/psicotecnico",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(result)});
      var d=await r.json();
      if(d.ok) showReport(result);
      else R('<div class="card"><h2>Error</h2><div class="sub">'+(d.error||"")+'</div></div>');
    }catch(e){R('<div class="card"><h2>Error</h2><div class="sub">'+e.message+'</div></div>');}
  }

  function showReport(r){
    var fc={"verde":"f-v","amarillo":"f-a","rojo":"f-r"};
    var fl={"verde":"\u2705 Verde","amarillo":"\u26a0\ufe0f Amarillo","rojo":"\u274c Rojo"};
    var bc={"verde":"#059669","amarillo":"#D97706","rojo":"#DC2626"};

    var areas=[
      {id:"responsabilidad",label:"Responsabilidad y compromiso",score:r.score_responsabilidad,flag:r.flag_responsabilidad},
      {id:"servicio",label:"Orientaci\u00f3n al servicio",score:r.score_servicio,flag:r.flag_servicio},
      {id:"instrucciones",label:"Seguimiento de instrucciones",score:r.score_instrucciones,flag:r.flag_instrucciones},
      {id:"honestidad",label:"Honestidad y confiabilidad",score:r.score_honestidad,flag:r.flag_honestidad},
      {id:"estabilidad",label:"Estabilidad emocional",score:r.score_estabilidad,flag:r.flag_estabilidad},
      {id:"equipo",label:"Trabajo en equipo",score:r.score_equipo,flag:r.flag_equipo},
      {id:"sst",label:"Seguridad y salud en el trabajo",score:r.score_sst,flag:r.flag_sst}
    ];

    var rows=areas.map(function(a){
      return '<div class="report-row"><div style="flex:1"><strong>'+a.label+'</strong></div>'
        +'<div style="display:flex;align-items:center;gap:10px">'
        +'<div class="bar-bg"><div class="bar-fill" style="width:'+a.score+'%;background:'+bc[a.flag]+'"></div></div>'
        +'<span style="font-weight:700;font-size:13px;min-width:35px;text-align:right">'+a.score+'%</span>'
        +'<span class="flag '+fc[a.flag]+'">'+fl[a.flag]+'</span></div></div>';
    }).join('');

    R('<div class="card">'
      +'<div style="text-align:center;margin-bottom:20px">'
      +'<div style="font-size:48px;margin-bottom:8px">'+(r.apto?"\u2705":"\u26a0\ufe0f")+'</div>'
      +'<h2>Informe psicot\u00e9cnico</h2>'
      +'<div class="sub">'+(r.candidato_nombre||"Candidato")+' \u2014 '+(r.cargo||"")+'</div></div>'

      +'<div style="text-align:center;padding:16px;border-radius:10px;margin-bottom:16px;background:'+(r.apto?"#DCFCE7":"#FEF3C7")+';border:1px solid '+(r.apto?"#059669":"#D97706")+'">'
      +'<div style="font-size:32px;font-weight:700;color:'+(r.apto?"#059669":"#D97706")+'">'+r.score_total+'%</div>'
      +'<div style="font-size:12px;font-weight:600;color:'+(r.apto?"#059669":"#D97706")+'">'+(r.apto?"APTO":"REQUIERE EVALUACI\u00d3N COMPLEMENTARIA")+'</div>'
      +'<span class="flag '+fc[r.flag_global]+'" style="margin-top:8px">Bandera global: '+fl[r.flag_global]+'</span></div>'

      +rows

      +'<div style="margin-top:16px;padding:14px;background:#F8F7F5;border-radius:8px">'
      +'<div style="font-size:12px;font-weight:700;color:#111;margin-bottom:6px">\ud83d\udcdd Concepto profesional</div>'
      +'<div style="font-size:12px;color:#555;line-height:1.6">'+r.concepto+'</div></div>'

      +(r.recomendaciones?'<div style="margin-top:12px;padding:14px;background:#FEF3C7;border:1px solid #D97706;border-radius:8px">'
      +'<div style="font-size:12px;font-weight:700;color:#92400E;margin-bottom:6px">\ud83d\udca1 Recomendaciones</div>'
      +'<div style="font-size:11px;color:#92400E;line-height:1.6">'+r.recomendaciones.replace(/\|/g,"<br/>\u2022")+'</div></div>':'')

      +'<div style="margin-top:12px;font-size:11px;color:#888;display:flex;justify-content:space-between">'
      +'<span>Duraci\u00f3n: '+(r.duracion_minutos||"?")+ ' min</span>'
      +'<span>'+new Date(r.created_at||Date.now()).toLocaleString("es-CO")+'</span></div>'

      +'<div class="legal">Evaluaci\u00f3n psicot\u00e9cnica realizada a trav\u00e9s de Habitaris Suite. Los resultados son orientativos y deben complementarse con entrevista personal. Confidencial \u2014 Uso exclusivo RRHH.</div>'
      +'</div>');
  }

  window.APP={start:start,answer:answer,nextSection:nextSection,prevSection:prevSection};
  load();
})();
</script>
</body>
</html>
