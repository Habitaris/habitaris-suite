<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#111111"/>
<title>Mi Habitaris</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:#F0EEE9;min-height:100vh;color:#1A1A19}
.topbar{background:#111;padding:14px 20px;display:flex;align-items:center;justify-content:space-between}
.topbar .logo{height:22px}.topbar .user{color:#fff;font-size:11px;opacity:.6}
.topbar .salir{color:#fff;font-size:10px;opacity:.4;cursor:pointer;border:1px solid rgba(255,255,255,.2);padding:4px 10px;border-radius:4px;background:none;font-family:inherit}
.tabs{display:flex;gap:0;border-bottom:2px solid #E5E3DE;background:#fff;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab{padding:12px 14px;font-size:11px;font-weight:500;color:#9B9B99;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap;transition:all .2s}
.tab.on{color:#1A1A19;font-weight:700;border-bottom-color:#1A1A19}
.main{max-width:900px;margin:0 auto;padding:20px}
.card{background:#fff;border:1px solid #E5E3DE;border-radius:8px;padding:16px 18px;margin-bottom:12px}
.card-t{font-size:13px;font-weight:700;margin-bottom:10px}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.kpi{background:#FAFAF8;border:1px solid #E5E3DE;border-radius:6px;padding:10px;text-align:center}
.kpi .l{font-size:7px;font-weight:700;color:#9B9B99;text-transform:uppercase;letter-spacing:.8px}
.kpi .v{font-size:20px;font-weight:800;font-family:'DM Mono',monospace;margin-top:2px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{padding:6px 10px;text-align:left;font-size:9px;font-weight:700;color:#9B9B99;letter-spacing:.8px;text-transform:uppercase;border-bottom:2px solid #1A1A19}
td{padding:6px 10px;border-bottom:1px solid #E5E3DE}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:9px;font-weight:700}
.b-g{background:#E8F4EE;color:#1E6B42}.b-a{background:#FFFBEB;color:#D97706}.b-r{background:#FEF2F2;color:#dc2626}.b-m{background:#F5F4F1;color:#666}
.btn{padding:8px 16px;border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;display:inline-flex;align-items:center;gap:6px}
.btn-p{background:#1A1A19;color:#fff}.btn-s{background:#FAFAF8;border:1px solid #E5E3DE;color:#1A1A19}.btn-g{background:#E8F4EE;border:1px solid #1E6B42;color:#1E6B42}
.form-g{margin-bottom:14px}.form-g label{display:block;font-size:10px;font-weight:700;color:#9B9B99;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.form-g input,.form-g select,.form-g textarea{width:100%;padding:10px 12px;border:1px solid #E5E3DE;border-radius:6px;font-size:13px;font-family:'DM Sans',sans-serif;background:#fff}
.form-g textarea{resize:vertical;min-height:70px}
.empty{text-align:center;padding:30px 20px;color:#9B9B99;font-size:13px}
.mono{font-family:'DM Mono',monospace}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.login-card{width:340px;border-radius:12px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.1)}
.login-top{background:#111;padding:28px 24px;text-align:center}
.login-top p{font-size:11px;color:rgba(255,255,255,.4);margin-top:4px}
.login-body{background:#fff;padding:24px}
.dots{display:flex;justify-content:center;gap:12px;margin:16px 0}
.dot{width:14px;height:14px;border-radius:50%;background:#E5E3DE;transition:.2s}.dot.on{background:#1E6B42}
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;max-width:200px;margin:0 auto}
.key{padding:14px;font-size:18px;font-weight:600;border:1px solid #E5E3DE;border-radius:8px;background:#FAFAF8;cursor:pointer;text-align:center;font-family:'DM Sans',sans-serif;-webkit-user-select:none}
.key:active{background:#ddd}.key.del{background:#FEF2F2;color:#dc2626}
.pin-err{color:#dc2626;font-size:12px;text-align:center;margin-bottom:8px}
.fichar-zone{background:#fff;border:1px solid #E5E3DE;border-radius:12px;padding:20px;margin-bottom:16px;text-align:center}
.fichar-btn{width:100%;padding:18px;border:none;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;display:flex;align-items:center;justify-content:center;gap:10px;transition:all .15s}
.fichar-btn.entrada{background:#1E6B42;color:#fff}.fichar-btn.salida{background:#dc2626;color:#fff}
.fichar-btn:active{transform:scale(.98)}
.centro-tag{font-size:10px;color:#9B9B99;margin-top:8px}
.centro-tag b{color:#1A1A19}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;font-size:11px;text-align:center}
.cal-hdr{padding:4px;font-size:8px;font-weight:700;color:#9B9B99;text-transform:uppercase}
.cal-day{padding:6px 2px;border-radius:4px}.cal-day.festivo{background:#FEF2F2;color:#dc2626;font-weight:700}
.cal-day.today{background:#1A1A19;color:#fff;font-weight:700;border-radius:50%}.cal-day.empty{color:transparent}
.spin{width:20px;height:20px;border:3px solid #E5E3DE;border-top-color:#111;border-radius:50%;animation:sp 1s linear infinite;margin:0 auto}
@keyframes sp{to{transform:rotate(360deg)}}
@media(max-width:600px){.kpis{grid-template-columns:repeat(2,1fr)}.main{padding:12px}.tab{padding:10px 10px;font-size:10px}}
</style>
</head>
<body>
<div id="app"></div>
<script>
(function(){
  var me=null,att=[],novs=[],tab="fichar",emps=[],misCentros=[],selCentro=null;
  // Iconos de tipo de OT para mostrar en el fichaje
  var OT_ICONO={gastos_generales:"🏢",proyecto:"🏗️",ot_puntual:"📋"};
  var OT_LABEL={gastos_generales:"Oficina",proyecto:"Proyecto",ot_puntual:"OT puntual"};
  var ccInput="",ccErr=false,pin="",pinErr=false;
  var gps=null,gpsErr=null,foto=null,vs=null;
  var curMonth=new Date().getMonth(),calYear=new Date().getFullYear();
  var devInfo=(navigator.userAgent||"").substring(0,100);
  var devLabel=/iPhone/i.test(devInfo)?"iPhone":/iPad/i.test(devInfo)?"iPad":/Android/i.test(devInfo)?"Android":/Mac/i.test(devInfo)?"Mac":/Windows/i.test(devInfo)?"Windows":"Dispositivo";
  var $=document.getElementById.bind(document);
  function today(){var d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
  function tryGPS(){if(navigator.geolocation)navigator.geolocation.getCurrentPosition(function(p){gps={lat:p.coords.latitude,lng:p.coords.longitude,prec:Math.round(p.coords.accuracy)};},function(e){gpsErr=e.message;},{enableHighAccuracy:true,timeout:30000,maximumAge:0});}
  tryGPS();
  function haversine(a,b,c,d){var R=6371000,dL=(c-a)*Math.PI/180,dN=(d-b)*Math.PI/180,x=Math.sin(dL/2)*Math.sin(dL/2)+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dN/2)*Math.sin(dN/2);return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));}
  function detectCentro(){if(!gps||!me)return{nombre:"Sin GPS",auto:false};var cs=misCentros;if(!cs.length)return{nombre:"GPS activo",auto:false};for(var i=0;i<cs.length;i++){var c=cs[i];if(c.lat&&c.lng){var d=haversine(gps.lat,gps.lng,c.lat,c.lng);if(d<300)return{nombre:c.nombre||c.direccion,id:c.id,tipo:c.tipo||"gastos_generales",auto:true,dist:Math.round(d)};}}return{nombre:"Fuera de centro",auto:false};}
  function festivosCO(y){function easter(y){var a=y%19,b=Math.floor(y/100),c=y%100,d=Math.floor(b/4),e=b%4,f=Math.floor((b+8)/25),g=Math.floor((b-f+1)/3),h=(19*a+b-d-g+15)%30,i=Math.floor(c/4),k=c%4,l=(32+2*e+2*i-h-k)%7,m=Math.floor((a+11*h+22*l)/451),mo=Math.floor((h+l-7*m+114)/31),da=(h+l-7*m+114)%31+1;return new Date(y,mo-1,da);}var e=easter(y);function add(d,n){var r=new Date(d);r.setDate(r.getDate()+n);return r;}function nMon(d){var x=d.getDay();if(x===1)return d;return add(d,x===0?1:8-x);}var list=[];[[0,1,"Año Nuevo"],[4,1,"Día del Trabajo"],[6,20,"Independencia"],[7,7,"Batalla Boyacá"],[11,8,"Inmaculada"],[11,25,"Navidad"]].forEach(function(f){list.push({fecha:new Date(y,f[0],f[1]),nombre:f[2]});});[[0,6,"Reyes Magos"],[2,19,"San José"],[5,29,"San Pedro y Pablo"],[7,15,"Asunción"],[9,12,"Día Raza"],[10,1,"Todos Santos"],[10,11,"Independencia Cartagena"]].forEach(function(f){list.push({fecha:nMon(new Date(y,f[0],f[1])),nombre:f[2]});});[[-3,"Jueves Santo"],[-2,"Viernes Santo"],[43,"Ascensión"],[64,"Corpus Christi"],[71,"Sagrado Corazón"]].forEach(function(r){list.push({fecha:r[0]<0?add(e,r[0]):nMon(add(e,r[0])),nombre:r[1]});});return list.sort(function(a,b){return a.fecha-b.fecha;});}
  async function loadEmps(){try{var r=await fetch("/api/employees-public");var d=await r.json();emps=d.data||[];}catch(e){emps=[];}renderLogin();}
  async function loadAtt(){try{var r=await fetch("/api/attendance?employee_id="+me.id);var d=await r.json();att=d.data||[];}catch(e){att=[];}}
  async function loadNov(){try{var r=await fetch("/api/novelties?employee_id="+me.id);var d=await r.json();novs=d.data||[];}catch(e){novs=[];}}
  function renderLogin(){$("app").innerHTML='<div class="login-wrap"><div class="login-card"><div class="login-top"><img src="/logo-habitaris-blanco.jpg" alt="Habitaris" style="height:28px;margin-bottom:6px"/><p>Mi Habitaris</p></div><div class="login-body" id="loginBody"></div></div></div>';renderCCScreen();}
  function renderCCScreen(){$("loginBody").innerHTML='<div style="text-align:center;margin-bottom:12px"><div style="font-size:28px">👋</div><div style="font-size:15px;font-weight:700;margin-top:6px">Bienvenido</div><div style="font-size:12px;color:#888;margin-top:2px">Ingresa tu número de cédula</div></div>'+(ccErr?'<div style="color:#dc2626;font-size:12px;text-align:center;margin-bottom:8px">Cédula no encontrada</div>':'')+'<div style="margin:12px 0"><input id="ccField" type="tel" placeholder="Tu número de cédula" value="'+ccInput+'" style="width:100%;padding:14px;border:1px solid '+(ccErr?'#dc2626':'#E5E3DE')+';border-radius:8px;font-size:18px;font-family:\'DM Mono\',monospace;text-align:center;letter-spacing:2px" onkeypress="if(event.key===\'Enter\')APP.buscarCC()"/></div><button class="btn btn-p" style="width:100%;justify-content:center" onclick="APP.buscarCC()">Continuar →</button><div style="text-align:center;margin-top:10px;font-size:10px;color:#aaa">PIN: últimos 4 dígitos de tu cédula</div>';setTimeout(function(){var f=document.getElementById("ccField");if(f)f.focus();},100);}
  function buscarCC(){var f=document.getElementById("ccField");if(!f)return;ccInput=f.value.replace(/\D/g,"");if(ccInput.length<4){ccErr=true;renderCCScreen();return;}var found=emps.find(function(e){return(e.documento||"").replace(/\D/g,"")===ccInput;});if(!found){ccErr=true;renderCCScreen();return;}me=found;ccErr=false;pin="";pinErr=false;renderPinScreen();}
  function renderPinScreen(){var dots='<div class="dots">';for(var i=0;i<4;i++)dots+='<div class="dot'+(i<pin.length?' on':'')+'"></div>';dots+='</div>';var keys="";[1,2,3,4,5,6,7,8,9,"",0,"⌫"].forEach(function(k){if(k==="")keys+='<div></div>';else if(k==="⌫")keys+='<div class="key del" onclick="APP.pinKey(\'del\')">⌫</div>';else keys+='<div class="key" onclick="APP.pinKey(\''+k+'\')">'+k+'</div>';});$("loginBody").innerHTML='<div style="text-align:center;margin-bottom:8px"><div style="font-size:15px;font-weight:700">Hola, '+me.nombre.split(" ")[0]+'</div><div style="font-size:12px;color:#888;margin-top:2px">Ingresa tu PIN'+(me.pin_changed?'':' (últimos 4 dígitos de tu cédula)')+'</div></div>'+dots+(pinErr?'<div class="pin-err">PIN incorrecto</div>':'')+'<div class="numpad">'+keys+'</div><div style="text-align:center;margin-top:12px"><button onclick="APP.forgotPin()" style="border:none;background:none;color:#2563eb;font-size:11px;cursor:pointer;font-family:inherit">¿Olvidaste tu PIN?</button></div><div style="text-align:center;margin-top:6px"><button onclick="APP.backToCC()" style="border:none;background:none;color:#888;font-size:11px;cursor:pointer;font-family:inherit">← Cambiar cédula</button></div>';}
  function handlePinKey(k){if(k==="del"){pin=pin.slice(0,-1);renderPinScreen();return;}pin+=k;if(pin.length===4){if(pin===me.pin){pinErr=false;pin="";if(!me.pin_changed)changePinFlow("Crea tu PIN personal","Por seguridad, cambia tu PIN temporal.");else checkAndEnter();}else{pinErr=true;pin="";renderPinScreen();}}else renderPinScreen();}
  var has2FA=false;
  async function checkAndEnter(){try{var r=await fetch("/api/employees-public?emp="+me.id);var d=await r.json();if(d.ok&&d.data&&d.data[0])has2FA=!!d.data[0].twofa_enabled;}catch(e){}if(has2FA){send2FA();}else{enterApp();}}
  function send2FA(){$("loginBody").innerHTML='<div style="text-align:center;padding:30px"><div class="spin"></div><div style="font-size:13px;color:#888;margin-top:8px">Enviando código...</div></div>';fetch("/api/employees-public",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({action:"send_otp",emp_id:me.id,purpose:"2fa"})}).then(function(r){return r.json();}).then(function(d){if(d.ok)renderOTPScreen("2fa");else{alert("Error");renderPinScreen();}}).catch(function(e){alert("Error");renderPinScreen();});}
  var otpVal="";
  function renderOTPScreen(purpose){otpVal="";$("loginBody").innerHTML='<div style="text-align:center"><div style="font-size:28px;margin-bottom:8px">✉️</div><div style="font-size:15px;font-weight:700">Verificación</div><div style="font-size:12px;color:#888;margin:6px 0 16px">Código enviado a: <b>'+me.email_masked+'</b></div><div style="margin:12px 0"><input id="otpField" type="tel" maxlength="6" placeholder="000000" style="width:180px;padding:14px;border:1px solid #E5E3DE;border-radius:8px;font-size:22px;font-family:monospace;text-align:center;letter-spacing:5px" oninput="APP.otpKey(this.value,\''+purpose+'\')"/></div><div style="font-size:10px;color:#999">Expira en 10 min</div><button onclick="APP.sendRecoveryOTP()" style="border:none;background:none;color:#2563eb;font-size:11px;cursor:pointer;font-family:inherit;margin-top:8px">Reenviar</button></div>';setTimeout(function(){var f=document.getElementById("otpField");if(f)f.focus();},100);}
  function handleOTPKey(v,p){otpVal=v.replace(/\D/g,"");if(otpVal.length===6){$("loginBody").innerHTML='<div style="text-align:center;padding:30px"><div class="spin"></div></div>';fetch("/api/employees-public",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({action:"verify_otp",emp_id:me.id,code:otpVal})}).then(function(r){return r.json();}).then(function(d){if(d.ok){if(p==="recovery")changePinFlow("Nuevo PIN","Código verificado.");else enterApp();}else{alert("Código incorrecto");renderOTPScreen(p);}}).catch(function(e){alert("Error");renderOTPScreen(p);});}}
  function forgotPin(){if(!me||!me.email_masked){alert("No hay email. Contacta RRHH.");return;}$("loginBody").innerHTML='<div style="text-align:center"><div style="font-size:28px;margin-bottom:8px">📧</div><div style="font-size:15px;font-weight:700">Recuperar PIN</div><div style="font-size:12px;color:#888;margin:6px 0 16px">Código a: <b>'+me.email_masked+'</b></div><button class="btn btn-p" style="width:100%;justify-content:center" onclick="APP.sendRecoveryOTP()">Enviar código</button><button onclick="APP.backToCC()" style="border:none;background:none;color:#888;font-size:11px;cursor:pointer;font-family:inherit;margin-top:12px;display:block;width:100%;text-align:center">← Volver</button></div>';}
  function sendRecoveryOTP(){$("loginBody").innerHTML='<div style="text-align:center;padding:30px"><div class="spin"></div></div>';fetch("/api/employees-public",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({action:"send_otp",emp_id:me.id,purpose:"recovery"})}).then(function(r){return r.json();}).then(function(d){if(d.ok)renderOTPScreen("recovery");else{alert("Error");renderPinScreen();}}).catch(function(){renderPinScreen();});}
  var np1="",np2="";
  function changePinFlow(t,s){np1="";np2="";renderNewPin(1,t,s);}
  function renderNewPin(ph,t,s){var p=ph===1?np1:np2;var dots="";for(var i=0;i<4;i++)dots+='<div class="dot'+(i<p.length?' on':'')+'"></div>';var keys="";[1,2,3,4,5,6,7,8,9,"",0,"⌫"].forEach(function(k){if(k==="")keys+='<div></div>';else if(k==="⌫")keys+='<div class="key del" onclick="APP.npk(\'del\','+ph+')">⌫</div>';else keys+='<div class="key" onclick="APP.npk(\''+k+'\','+ph+')">'+k+'</div>';});$("loginBody").innerHTML='<div style="text-align:center"><div style="font-size:28px;margin-bottom:8px">'+(ph===1?'🔐':'✅')+'</div><div style="font-size:15px;font-weight:700">'+(t||"Nuevo PIN")+'</div><div style="font-size:12px;color:#888;margin:4px 0 12px">'+(ph===1?(s||"Elige 4 dígitos"):"Confirma tu PIN")+'</div><div class="dots">'+dots+'</div><div class="numpad">'+keys+'</div></div>';}
  function handleNPK(k,ph){if(ph===1){if(k==="del"){np1=np1.slice(0,-1);renderNewPin(1);return;}np1+=k;if(np1.length===4)renderNewPin(2);else renderNewPin(1);}else{if(k==="del"){np2=np2.slice(0,-1);renderNewPin(2);return;}np2+=k;if(np2.length===4){if(np1===np2){$("loginBody").innerHTML='<div style="text-align:center;padding:30px"><div class="spin"></div></div>';fetch("/api/employees-public",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({action:"change_pin",emp_id:me.id,new_pin:np1})}).then(function(r){return r.json();}).then(function(d){if(d.ok){me.pin=np1;me.pin_changed=true;$("loginBody").innerHTML='<div style="text-align:center;padding:24px"><div style="font-size:28px;margin-bottom:8px">✅</div><div style="font-size:15px;font-weight:700">PIN actualizado</div><button class="btn btn-p" style="width:100%;justify-content:center;margin-top:12px" onclick="APP.enterApp()">Continuar</button></div>';}else{alert("Error");changePinFlow();}}).catch(function(){changePinFlow();});}else{np2="";$("loginBody").innerHTML='<div style="text-align:center;padding:20px"><div style="color:#dc2626;font-size:13px;margin-bottom:12px">Los PIN no coinciden</div><button class="btn btn-p" onclick="APP.retryPin()">Reintentar</button></div>';}}else renderNewPin(2);}}
  async function enterApp(){$("app").innerHTML='<div style="display:flex;align-items:center;justify-content:center;min-height:100vh"><div class="spin"></div></div>';await loadAtt();await loadNov();try{var rc=await fetch("/api/hiring?kv=centros&anio=0&mes=0");var dc=await rc.json();var allC=dc.ok&&dc.data?dc.data:[];misCentros=allC.filter(function(c){return c.activo&&(c.empleados||[]).indexOf(me.id)!==-1;});if(misCentros.length===1)selCentro=misCentros[0];}catch(e){misCentros=[];}tryGPS();render();}
  function render(){$("app").innerHTML='<div class="topbar"><img class="logo" src="/logo-habitaris-blanco.jpg" alt="Habitaris"/><span class="user">'+me.nombre+'</span><button class="salir" onclick="APP.logout()">Salir</button></div><div class="tabs" id="tabs"></div><div class="main" id="content"></div>';renderTabs();renderContent();}
  function renderTabs(){var items=[{id:"fichar",lbl:"📍 Fichar"},{id:"asistencia",lbl:"📋 Asistencia"},{id:"nominas",lbl:"💰 Nóminas"},{id:"solicitudes",lbl:"📨 Solicitudes"},{id:"vacaciones",lbl:"🏖️ Vacaciones"},{id:"certificacion",lbl:"📄 Certificación"},{id:"calendario",lbl:"📅 Calendario"},{id:"seguridad",lbl:"⚙️ Seguridad"}];$("tabs").innerHTML=items.map(function(t){return '<div class="tab'+(tab===t.id?' on':'')+'" onclick="APP.setTab(\''+t.id+'\')">'+t.lbl+'</div>';}).join("");}
  function renderContent(){var fn={fichar:renderFichar,asistencia:renderAsistencia,nominas:renderNominas,solicitudes:renderSolicitudes,vacaciones:renderVacaciones,certificacion:renderCertificacion,calendario:renderCalendario,seguridad:renderSeguridad};if(fn[tab])fn[tab]();}

  window.APP={buscarCC:buscarCC,backToCC:function(){me=null;pin="";pinErr=false;ccInput="";renderCCScreen();},pinKey:handlePinKey,npk:handleNPK,otpKey:handleOTPKey,forgotPin:forgotPin,sendRecoveryOTP:sendRecoveryOTP,retryPin:function(){changePinFlow();},enterApp:enterApp,setTab:function(t){tab=t;renderTabs();renderContent();},setMonth:function(m){curMonth=parseInt(m);renderContent();},setCalYear:function(y){calYear=y;renderContent();},selCentroFn:function(id){selCentro=misCentros.find(function(c){return c.id===id;})||null;},enviarNov:enviarNov,genCert:genCert,startFichaje:startFichaje,snap:snap,cancelFichaje:cancelFichaje,toggle2FA:toggle2FA,recibirNomina:function(nid){fetch("/api/employees-public",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({action:"nomina_recibida",emp_id:me.id,nomina_id:nid})}).then(function(r){return r.json();}).then(function(d){if(d.ok){renderNominas();}});},verNominaPDF:function(nid){fetch("/api/employees-public",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({action:"get_nomina_html",emp_id:me.id,nomina_id:nid})}).then(function(r){return r.json();}).then(function(d){if(d.ok&&d.html){var w=window.open('','_blank');if(w){w.document.write(d.html);w.document.close();}else{alert("Permite las ventanas emergentes para ver el PDF");}}else{alert("PDF no disponible para esta nómina");}}).catch(function(){alert("Error al cargar el PDF");});},changeMyPin:function(){$("app").innerHTML='<div class="login-wrap"><div class="login-card"><div class="login-top"><img src="/logo-habitaris-blanco.jpg" alt="Habitaris" style="height:28px;margin-bottom:6px"/><p>Cambiar PIN</p></div><div class="login-body" id="loginBody"></div></div></div>';changePinFlow("Nuevo PIN","Elige 4 dígitos");},logout:function(){me=null;att=[];novs=[];pin="";tab="fichar";ccInput="";misCentros=[];selCentro=null;$("app").innerHTML="";loadEmps();}};
