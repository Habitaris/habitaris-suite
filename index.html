    <style>
      /* Habitaris Suite — Corrector ortográfico global */
      input[type="text"], input:not([type]), textarea {
        -webkit-spellcheck: true;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Enable spellcheck on all inputs
      new MutationObserver(function(){
        document.querySelectorAll('input[type="text"],input:not([type]),textarea').forEach(function(el){
          if(!el.dataset.hbInit){el.spellcheck=true;el.dataset.hbInit='1';}
        });
      }).observe(document.body||document.documentElement,{childList:true,subtree:true});
    </script>
  </body>
