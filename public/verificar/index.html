<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Verificar Firma · Habitaris</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',Arial,sans-serif;background:#F0EEE9;min-height:100vh;color:#111;display:flex;flex-direction:column}
.hdr{background:#111;padding:16px 20px;text-align:center}
.hdr img{height:28px}
.wrap{max-width:560px;margin:0 auto;padding:20px;flex:1}
.card{background:#fff;border-radius:12px;padding:24px;box-shadow:0 1px 4px rgba(0,0,0,.06);margin-bottom:16px}
h2{font-size:18px;font-weight:700;margin-bottom:4px}
.sub{font-size:12px;color:#888;margin-bottom:20px}
.valid{background:#DCFCE7;border:2px solid #059669;border-radius:12px;padding:20px;text-align:center;margin-bottom:20px}
.invalid{background:#FEE2E2;border:2px solid #DC2626;border-radius:12px;padding:20px;text-align:center;margin-bottom:20px}
.info-row{display:flex;justify-content:space-between;font-size:13px;padding:10px 0;border-bottom:1px solid #F3F4F6}
.info-row:last-child{border:none}
.info-label{color:#888;font-weight:600;font-size:11px;text-transform:uppercase}
.info-value{color:#111;font-weight:500;text-align:right;max-width:60%}
.btn{width:100%;padding:14px;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;text-align:center;background:#111;color:#fff;margin-bottom:8px}
input{width:100%;padding:14px;border:1px solid #DDD;border-radius:8px;font-size:16px;font-family:'DM Sans',sans-serif;text-align:center;letter-spacing:2px;margin-bottom:16px}
.spin{width:24px;height:24px;border:3px solid #E0E0E0;border-top-color:#111;border-radius:50%;animation:sp 1s linear infinite;margin:0 auto 8px}
@keyframes sp{to{transform:rotate(360deg)}}
.sig-img{border:1px solid #EEE;border-radius:8px;padding:8px;background:#FAFAFA;max-width:200px;margin:12px auto}
.sig-img img{display:block;max-width:100%;height:auto}
.foot{text-align:center;padding:16px;font-size:10px;color:#999}
</style>
</head>
<body>
<div class="hdr"><img src="/logo-habitaris-blanco.png" alt="Habitaris"/></div>
<div class="wrap" id="app"></div>
<div class="foot">HABITARIS SAS · NIT 901.922.136-8 · Verificacion de firma digital SHA-256</div>
<script>
(function(){
  var params = new URLSearchParams(window.location.search);
  var CERT = params.get("cert") || "";

  function R(h){ document.getElementById("app").innerHTML = h; }

  function showSearch() {
    R('<div class="card" style="text-align:center">'
      + '<div style="font-size:48px;margin-bottom:12px">🔍</div>'
      + '<h2>Verificar firma digital</h2>'
      + '<div class="sub">Ingrese el codigo del certificado para verificar su autenticidad</div>'
      + '<input type="text" id="certInput" placeholder="HAB-CERT-2026-XXXXXX" value="' + CERT + '"/>'
      + '<button class="btn" onclick="verify()">Verificar →</button>'
      + '</div>');
    if (CERT) verify();
  }

  async function verify() {
    var code = document.getElementById("certInput") ? document.getElementById("certInput").value.trim() : CERT;
    if (!code) { alert("Ingrese un codigo"); return; }

    R('<div class="card" style="text-align:center;padding:40px"><div class="spin"></div><div style="font-size:13px;color:#888">Verificando...</div></div>');

    try {
      var r = await fetch("/api/firma?cert=" + encodeURIComponent(code));
      var d = await r.json();
      if (d.ok && d.valid) {
        showValid(d.certificate);
      } else {
        showInvalid(code);
      }
    } catch(e) {
      R('<div class="card" style="text-align:center"><h2>Error</h2><div class="sub">' + e.message + '</div><button class="btn" onclick="showSearch()">Reintentar</button></div>');
    }
  }

  function showValid(c) {
    var ts = new Date(c.timestamp_utc).toLocaleString("es-CO", {dateStyle:"long",timeStyle:"medium"});
    R('<div class="card">'
      + '<div class="valid">'
      + '<div style="font-size:48px;margin-bottom:8px">✅</div>'
      + '<div style="font-size:16px;font-weight:700;color:#059669">FIRMA VALIDA</div>'
      + '<div style="font-size:12px;color:#059669;margin-top:4px">Certificado autentico y vigente</div>'
      + '</div>'
      + '<div style="font-size:11px;font-weight:600;color:#888;letter-spacing:1px;margin-bottom:12px">DATOS DEL CERTIFICADO</div>'
      + '<div class="info-row"><span class="info-label">Codigo</span><span class="info-value" style="font-family:monospace;font-weight:700">' + c.certificate_code + '</span></div>'
      + '<div class="info-row"><span class="info-label">Documento</span><span class="info-value">' + c.doc_code + '</span></div>'
      + '<div class="info-row"><span class="info-label">Titulo</span><span class="info-value">' + c.doc_title + '</span></div>'
      + '<div class="info-row"><span class="info-label">Firmante</span><span class="info-value">' + c.signer_name + '</span></div>'
      + '<div class="info-row"><span class="info-label">' + (c.signer_id_type||"CC") + '</span><span class="info-value">' + (c.signer_id_number||"") + '</span></div>'
      + '<div class="info-row"><span class="info-label">Rol</span><span class="info-value">' + c.signer_role + '</span></div>'
      + '<div class="info-row"><span class="info-label">Fecha firma</span><span class="info-value">' + ts + '</span></div>'
      + '<div class="info-row"><span class="info-label">Hash SHA-256</span><span class="info-value" style="font-family:monospace;font-size:9px;word-break:break-all">' + (c.doc_hash||"").substring(0,32) + '...</span></div>'
      + '<div class="info-row"><span class="info-label">IP</span><span class="info-value">' + (c.ip_address||"capturada") + '</span></div>'
      + (c.geo_lat ? '<div class="info-row"><span class="info-label">GPS</span><span class="info-value">' + c.geo_lat.toFixed(4) + ', ' + c.geo_lng.toFixed(4) + '</span></div>' : '')
      + (c.signature_image ? '<div style="margin-top:16px;text-align:center"><div style="font-size:11px;color:#888;margin-bottom:8px">Firma del signatario:</div><div class="sig-img"><img src="' + c.signature_image + '"/></div></div>' : '')
      + '<div style="margin-top:16px;font-size:9px;color:#999;line-height:1.5;border-top:1px solid #F3F4F6;padding-top:12px">'
      + 'Este certificado acredita que la persona indicada firmo electronicamente el documento referenciado. '
      + 'La firma fue capturada con verificacion de IP, dispositivo, ubicacion GPS y marca temporal UTC. '
      + 'Validez legal: Ley 527/1999 (Colombia) · Reglamento (UE) 910/2014 (eIDAS) · UNCITRAL Model Law on Electronic Signatures.</div>'
      + '</div>'
      + '<button class="btn" onclick="window.print()">Imprimir certificado</button>');
  }

  function showInvalid(code) {
    R('<div class="card">'
      + '<div class="invalid">'
      + '<div style="font-size:48px;margin-bottom:8px">❌</div>'
      + '<div style="font-size:16px;font-weight:700;color:#DC2626">FIRMA NO ENCONTRADA</div>'
      + '<div style="font-size:12px;color:#DC2626;margin-top:4px">El codigo "' + code + '" no existe en el sistema</div>'
      + '</div>'
      + '<div style="font-size:12px;color:#888;margin-bottom:16px">Verifique que el codigo sea correcto e intentelo de nuevo.</div>'
      + '<input type="text" id="certInput" placeholder="HAB-CERT-2026-XXXXXX"/>'
      + '<button class="btn" onclick="verify()">Verificar otro →</button>'
      + '</div>');
  }

  window.showSearch = showSearch;
  window.verify = verify;
  showSearch();
})();
</script>
</body>
</html>
