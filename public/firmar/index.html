<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>Firma Digital · Habitaris</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',Arial,sans-serif;background:#F0EEE9;min-height:100vh;color:#111}
.hdr{background:#111;padding:16px 20px;text-align:center}
.hdr img{height:28px}
.wrap{max-width:700px;margin:0 auto;padding:20px}
.card{background:#fff;border-radius:12px;padding:24px;box-shadow:0 1px 4px rgba(0,0,0,.06);margin-bottom:16px}
h2{font-size:18px;font-weight:700;margin-bottom:4px}
.sub{font-size:12px;color:#888;margin-bottom:20px}
.info-row{display:flex;justify-content:space-between;font-size:13px;padding:8px 0;border-bottom:1px solid #F3F4F6}
.info-row:last-child{border:none}
.info-label{color:#888;font-weight:600;font-size:11px;text-transform:uppercase}
.info-value{color:#111;font-weight:500;text-align:right}
.otp-input{display:flex;justify-content:center;gap:8px;margin:20px 0}
.otp-input input{width:44px;height:52px;text-align:center;font-size:22px;font-weight:700;border:2px solid #DDD;border-radius:8px;font-family:'DM Sans',sans-serif;outline:none}
.otp-input input:focus{border-color:#111}
.pdf-viewer{border:1px solid #DDD;border-radius:8px;overflow:hidden;background:#666;margin-bottom:16px}
.pdf-scroll{max-height:500px;overflow-y:auto;padding:8px;display:flex;flex-direction:column;align-items:center;gap:8px}
.pdf-scroll canvas{max-width:100%;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.pdf-bar{background:#333;color:#fff;padding:8px 16px;display:flex;justify-content:space-between;align-items:center;font-size:12px}
.pdf-progress{height:3px;background:#444;border-radius:2px;overflow:hidden;margin-top:4px}
.pdf-progress-fill{height:100%;background:#059669;transition:width .3s}
.read-gate{background:#FEF3C7;border:1px solid #D97706;border-radius:8px;padding:14px;margin-bottom:16px;font-size:12px;color:#92400E;text-align:center}
.check-row{display:flex;align-items:start;gap:10px;margin-bottom:16px;padding:14px;border:1px solid #DDD;border-radius:8px}
.check-row input{width:18px;height:18px;margin-top:2px;flex-shrink:0}
.check-row label{font-size:13px;color:#333;cursor:pointer;line-height:1.4}
.pad-area{border:2px dashed #DDD;border-radius:12px;background:#FAFAFA;position:relative;margin-bottom:16px;touch-action:none}
.pad-area canvas{display:block;border-radius:10px;cursor:crosshair}
.pad-hint{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#CCC;font-size:14px;pointer-events:none}
.btn{width:100%;padding:14px;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;text-align:center;margin-bottom:8px}
.bk{background:#111;color:#fff}
.bg{background:#059669;color:#fff}
.ghost{background:none;color:#888;font-size:12px;padding:8px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;width:100%}
.btn:disabled{opacity:.4;cursor:not-allowed}
.spin{width:24px;height:24px;border:3px solid #E0E0E0;border-top-color:#111;border-radius:50%;animation:sp 1s linear infinite;margin:0 auto 8px}
@keyframes sp{to{transform:rotate(360deg)}}
.cert-box{background:#DCFCE7;border:1px solid #059669;border-radius:12px;padding:20px;text-align:center;margin-bottom:16px}
.cert-code{font-family:monospace;font-size:16px;font-weight:700;color:#059669;margin:8px 0}
.legal{font-size:9px;color:#999;line-height:1.5;margin-top:16px;padding-top:12px;border-top:1px solid #F3F4F6}
.step-bar{display:flex;gap:4px;margin-bottom:20px}
.step{flex:1;height:4px;border-radius:2px;background:#E0E0E0}
.step.done{background:#059669}
.step.active{background:#111}
.upload-area{border:1px dashed #CCC;border-radius:8px;padding:16px;text-align:center;margin-bottom:12px;cursor:pointer;background:#FAFAFA}
.upload-area:hover{border-color:#888;background:#F5F5F5}
.or-divider{text-align:center;color:#CCC;font-size:11px;margin:12px 0;position:relative}
.or-divider::before,.or-divider::after{content:"";position:absolute;top:50%;width:40%;height:1px;background:#E0E0E0}
.or-divider::before{left:0}
.or-divider::after{right:0}
.timer{font-size:11px;color:#888;text-align:center;margin-top:4px}
</style>
</head>
<body>
<div class="hdr"><img src="/logo-habitaris-blanco.png" alt="Habitaris"/></div>
<div class="wrap" id="app"><div style="text-align:center;padding:40px"><div class="spin"></div></div></div>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
(function(){
  var P=new URLSearchParams(window.location.search);
  var TOKEN=P.get("token")||"";
  var pending=null,sigData=null,gps=null;
  var canvas,ctx,drawing=false,hasDrawn=false;
  var scrolledToEnd=false,checked=false,otpVerified=false;

  function R(h){document.getElementById("app").innerHTML=h;}

  if(navigator.geolocation){navigator.geolocation.getCurrentPosition(function(p){gps={lat:p.coords.latitude,lng:p.coords.longitude};},function(){},{enableHighAccuracy:true,timeout:15000});}

  async function load(){
    if(!TOKEN){R('<div class="card" style="text-align:center"><h2>Enlace inv\u00e1lido</h2><div class="sub">No se encontr\u00f3 un token de firma.</div></div>');return;}
    try{
      var r=await fetch("/api/firma?token="+TOKEN);
      var d=await r.json();
      if(!d.ok||!d.data){R('<div class="card" style="text-align:center"><h2>Enlace inv\u00e1lido</h2><div class="sub">Este enlace no existe o ha expirado.</div></div>');return;}
      pending=d.data;
      if(pending.status==="signed"){R('<div class="card" style="text-align:center"><div style="font-size:48px;margin-bottom:12px">\u2705</div><h2>Documento ya firmado</h2></div>');return;}
      if(pending.status==="expired"){R('<div class="card" style="text-align:center"><h2>Enlace expirado</h2></div>');return;}
      showStep1();
    }catch(e){R('<div class="card"><h2>Error</h2><div class="sub">'+e.message+'</div></div>');}
  }

  // STEP 1: Info
  function showStep1(){
    R('<div class="step-bar"><div class="step active"></div><div class="step"></div><div class="step"></div><div class="step"></div><div class="step"></div></div>'
      +'<div class="card"><div style="text-align:center;margin-bottom:20px"><div style="font-size:40px;margin-bottom:8px">\ud83d\udcc4</div>'
      +'<h2>Firma de documento</h2><div class="sub">Verifique sus datos y proceda</div></div>'
      +'<div class="info-row"><span class="info-label">Documento</span><span class="info-value">'+pending.doc_code+'</span></div>'
      +'<div class="info-row"><span class="info-label">T\u00edtulo</span><span class="info-value">'+pending.doc_title+'</span></div>'
      +'<div class="info-row"><span class="info-label">Firmante</span><span class="info-value">'+pending.signer_name+'</span></div>'
      +'<div class="info-row"><span class="info-label">Rol</span><span class="info-value">'+pending.signer_role+'</span></div>'
      +'<div class="info-row"><span class="info-label">Email</span><span class="info-value">'+(pending.signer_email||"")+'</span></div>'
      +'<div style="background:#EFF6FF;border:1px solid #1D4ED8;border-radius:8px;padding:14px;font-size:12px;color:#1E40AF;margin:16px 0">'
      +'<strong>Proceso de firma:</strong> Se le enviar\u00e1 un c\u00f3digo de verificaci\u00f3n a su email. Luego deber\u00e1 leer el documento completo antes de firmar.</div>'
      +'<button class="btn bk" onclick="APP.sendOTP()">Enviar c\u00f3digo de verificaci\u00f3n \u2192</button>'
      +'</div>');
  }

  // STEP 2: OTP
  async function sendOTP(){
    R('<div class="step-bar"><div class="step done"></div><div class="step active"></div><div class="step"></div><div class="step"></div><div class="step"></div></div>'
      +'<div class="card" style="text-align:center"><div class="spin"></div><div style="font-size:13px;color:#888">Enviando c\u00f3digo a su email...</div></div>');
    try{
      var r=await fetch("/api/firma",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({action:"send_otp",token:TOKEN})});
      var d=await r.json();
      if(d.ok) showOTPInput(d.email);
      else R('<div class="card" style="text-align:center"><h2>Error</h2><div class="sub">'+(d.error||"")+'</div><button class="btn bk" onclick="APP.showStep1()">Reintentar</button></div>');
    }catch(e){R('<div class="card"><h2>Error</h2><div class="sub">'+e.message+'</div><button class="btn bk" onclick="APP.showStep1()">Reintentar</button></div>');}
  }

  function showOTPInput(maskedEmail){
    R('<div class="step-bar"><div class="step done"></div><div class="step active"></div><div class="step"></div><div class="step"></div><div class="step"></div></div>'
      +'<div class="card" style="text-align:center">'
      +'<div style="font-size:40px;margin-bottom:8px">\ud83d\udd12</div>'
      +'<h2>Verificaci\u00f3n de identidad</h2>'
      +'<div class="sub">Hemos enviado un c\u00f3digo de 6 d\u00edgitos a<br/><strong>'+(maskedEmail||pending.signer_email)+'</strong></div>'
      +'<div class="otp-input" id="otpBox">'
      +'<input type="tel" maxlength="1" id="o1" oninput="APP.otpNav(1)" autofocus/>'
      +'<input type="tel" maxlength="1" id="o2" oninput="APP.otpNav(2)"/>'
      +'<input type="tel" maxlength="1" id="o3" oninput="APP.otpNav(3)"/>'
      +'<input type="tel" maxlength="1" id="o4" oninput="APP.otpNav(4)"/>'
      +'<input type="tel" maxlength="1" id="o5" oninput="APP.otpNav(5)"/>'
      +'<input type="tel" maxlength="1" id="o6" oninput="APP.otpNav(6)"/>'
      +'</div>'
      +'<div id="otpErr" style="color:#DC2626;font-size:12px;margin-bottom:12px;display:none"></div>'
      +'<button class="btn bk" id="verifyBtn" onclick="APP.verifyOTP()">Verificar c\u00f3digo \u2192</button>'
      +'<div class="timer">El c\u00f3digo expira en 10 minutos</div>'
      +'<button class="ghost" onclick="APP.sendOTP()">Reenviar c\u00f3digo</button>'
      +'</div>');
    setTimeout(function(){document.getElementById("o1").focus();},100);
  }

  function otpNav(n){
    var el=document.getElementById("o"+n);
    if(el.value.length===1&&n<6){document.getElementById("o"+(n+1)).focus();}
    if(n===6&&el.value.length===1){verifyOTP();}
  }

  async function verifyOTP(){
    var code="";
    for(var i=1;i<=6;i++) code+=document.getElementById("o"+i).value;
    if(code.length!==6){document.getElementById("otpErr").textContent="Ingrese los 6 d\u00edgitos";document.getElementById("otpErr").style.display="block";return;}

    R('<div class="step-bar"><div class="step done"></div><div class="step active"></div><div class="step"></div><div class="step"></div><div class="step"></div></div>'
      +'<div class="card" style="text-align:center"><div class="spin"></div><div style="font-size:13px;color:#888">Verificando...</div></div>');

    try{
      var r=await fetch("/api/firma",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({action:"verify_otp",token:TOKEN,code:code})});
      var d=await r.json();
      if(d.ok&&d.verified){otpVerified=true;showStep3();}
      else{showOTPInput(null);setTimeout(function(){var e=document.getElementById("otpErr");if(e){e.textContent=d.error||"C\u00f3digo incorrecto";e.style.display="block";}},100);}
    }catch(e){showOTPInput(null);setTimeout(function(){var el=document.getElementById("otpErr");if(el){el.textContent=e.message;el.style.display="block";}},100);}
  }

  // STEP 3: Read document
  function showStep3(){
    scrolledToEnd=false;checked=false;
    R('<div class="step-bar"><div class="step done"></div><div class="step done"></div><div class="step active"></div><div class="step"></div><div class="step"></div></div>'
      +'<div class="card" style="padding:16px">'
      +'<div class="pdf-bar"><span>\ud83d\udcc4 '+pending.doc_code+'</span><span id="pageInfo"></span></div>'
      +'<div class="pdf-viewer"><div class="pdf-scroll" id="pdfScroll"></div></div>'
      +'<div class="pdf-progress"><div class="pdf-progress-fill" id="progFill" style="width:0%"></div></div>'
      +'<div id="readGate" class="read-gate">\u2b07\ufe0f Despl\u00e1cese hasta el final del documento para continuar</div>'
      +'<div id="checkArea" style="display:none">'
      +'<div class="check-row"><input type="checkbox" id="readCheck" onchange="APP.onCheck()"/><label for="readCheck">He le\u00eddo \u00edntegramente el documento <strong>'+pending.doc_code+'</strong> y manifiesto mi conformidad con su contenido.</label></div>'
      +'<button class="btn bk" id="toSignBtn" disabled onclick="APP.showStep4()">Proceder a firmar \u2192</button>'
      +'</div></div>');
    renderDoc();
  }

  function renderDoc(){
    var container=document.getElementById("pdfScroll");
    container.innerHTML='<div style="background:#fff;padding:40px;max-width:600px;width:100%;min-height:800px">'
      +'<div style="text-align:center;border-bottom:2px solid #111;padding-bottom:16px;margin-bottom:20px">'
      +'<div style="font-weight:700;font-size:18px;letter-spacing:2px">HABITARIS</div>'
      +'<div style="font-size:10px;color:#888">ARQUITECTURA \xb7 INTERIORISMO</div></div>'
      +'<div style="text-align:center;margin-bottom:24px"><div style="font-size:16px;font-weight:700">'+pending.doc_title+'</div>'
      +'<div style="font-size:11px;color:#888">'+pending.doc_code+'</div></div>'
      +'<div style="font-size:12px;color:#333;line-height:1.8">'
      +'<p>Este documento ha sido generado por Habitaris Suite y est\u00e1 pendiente de firma digital.</p>'
      +'<p style="margin-top:12px"><strong>Firmante:</strong> '+pending.signer_name+'</p>'
      +'<p><strong>Rol:</strong> '+pending.signer_role+'</p>'
      +'<p><strong>Identificaci\u00f3n:</strong> '+(pending.signer_id_number||"")+'</p>'
      +'<p style="margin-top:20px">El contenido completo del documento ha sido revisado y aprobado por las partes. Al firmar, el firmante acepta \u00edntegramente las condiciones establecidas.</p>'
      +'<p style="margin-top:20px;padding-top:16px;border-top:1px solid #eee;font-size:10px;color:#999">Documento protegido con SHA-256 \xb7 Verificable en suite.habitaris.co/verificar</p>'
      +'</div></div>';
    var sc=document.getElementById("pdfScroll");
    sc.style.maxHeight="500px";
    sc.addEventListener("scroll",function(){
      var pct=sc.scrollTop/(sc.scrollHeight-sc.clientHeight)*100;
      document.getElementById("progFill").style.width=Math.min(pct,100)+"%";
      if(pct>90&&!scrolledToEnd){scrolledToEnd=true;document.getElementById("readGate").style.display="none";document.getElementById("checkArea").style.display="block";}
    });
  }

  function onCheck(){checked=document.getElementById("readCheck").checked;document.getElementById("toSignBtn").disabled=!checked;}

  // STEP 4: Sign
  function showStep4(){
    R('<div class="step-bar"><div class="step done"></div><div class="step done"></div><div class="step done"></div><div class="step active"></div><div class="step"></div></div>'
      +'<div class="card">'
      +'<h2 style="text-align:center">\u270d\ufe0f Su firma</h2>'
      +'<div class="sub" style="text-align:center">Dibuje su firma o suba una imagen</div>'
      +'<div class="pad-area" id="padArea"><canvas id="sigCanvas" width="500" height="200"></canvas><div class="pad-hint" id="padHint">Firme aqu\u00ed</div></div>'
      +'<div class="or-divider">o suba una imagen</div>'
      +'<div class="upload-area" onclick="document.getElementById(\'sigFile\').click()">\ud83d\udcc1 Subir imagen de firma (PNG, JPG)</div>'
      +'<input type="file" id="sigFile" accept="image/*" style="display:none" onchange="APP.uploadSig(this)"/>'
      +'<div id="uploadPreview" style="display:none;text-align:center;margin-bottom:12px"><img id="uploadImg" style="max-height:80px;border:1px solid #DDD;border-radius:6px;padding:4px"/></div>'
      +(gps?'<div style="font-size:10px;color:#888;background:#F5F5F5;border-radius:6px;padding:6px 10px;margin-bottom:12px">\ud83d\udccd Ubicaci\u00f3n: '+gps.lat.toFixed(4)+', '+gps.lng.toFixed(4)+'</div>':'')
      +'<button class="btn bg" id="signBtn" disabled onclick="APP.submit()">Firmar documento \u2192</button>'
      +'<button class="ghost" onclick="APP.clearPad()">Borrar firma</button>'
      +'<button class="ghost" onclick="APP.showStep3()">\u2190 Volver al documento</button>'
      +'<div class="legal">Al firmar se registrar\u00e1: direcci\u00f3n IP, dispositivo, ubicaci\u00f3n GPS, fecha/hora UTC y c\u00f3digo OTP verificado. '
      +'Validez legal: Ley 527/1999 (Colombia) \xb7 Reglamento (UE) 910/2014 (eIDAS).</div>'
      +'</div>');
    initCanvas();
  }

  function initCanvas(){
    canvas=document.getElementById("sigCanvas");ctx=canvas.getContext("2d");
    ctx.strokeStyle="#111";ctx.lineWidth=2.5;ctx.lineCap="round";ctx.lineJoin="round";hasDrawn=false;drawing=false;
    function gp(e){var r=canvas.getBoundingClientRect();var x,y;if(e.touches){x=e.touches[0].clientX-r.left;y=e.touches[0].clientY-r.top;}else{x=e.clientX-r.left;y=e.clientY-r.top;}return{x:x*(canvas.width/r.width),y:y*(canvas.height/r.height)};}
    function s(e){e.preventDefault();drawing=true;var p=gp(e);ctx.beginPath();ctx.moveTo(p.x,p.y);}
    function m(e){e.preventDefault();if(!drawing)return;var p=gp(e);ctx.lineTo(p.x,p.y);ctx.stroke();hasDrawn=true;document.getElementById("padHint").style.display="none";document.getElementById("signBtn").disabled=false;document.getElementById("uploadPreview").style.display="none";}
    function en(e){e.preventDefault();drawing=false;}
    canvas.addEventListener("mousedown",s);canvas.addEventListener("mousemove",m);canvas.addEventListener("mouseup",en);canvas.addEventListener("mouseleave",en);
    canvas.addEventListener("touchstart",s);canvas.addEventListener("touchmove",m);canvas.addEventListener("touchend",en);
  }

  function clearPad(){
    if(ctx){ctx.clearRect(0,0,canvas.width,canvas.height);hasDrawn=false;sigData=null;
    document.getElementById("padHint").style.display="block";document.getElementById("signBtn").disabled=true;document.getElementById("uploadPreview").style.display="none";}
  }

  function uploadSig(input){
    if(!input.files||!input.files[0])return;
    var reader=new FileReader();
    reader.onload=function(){
      sigData=reader.result;hasDrawn=true;
      document.getElementById("uploadPreview").style.display="block";
      document.getElementById("uploadImg").src=sigData;
      document.getElementById("padHint").style.display="none";
      document.getElementById("signBtn").disabled=false;
      if(ctx)ctx.clearRect(0,0,canvas.width,canvas.height);
    };
    reader.readAsDataURL(input.files[0]);
  }

  async function submit(){
    if(!hasDrawn&&!sigData){alert("Debe firmar o subir una imagen.");return;}
    if(!sigData) sigData=canvas.toDataURL("image/png");

    R('<div class="step-bar"><div class="step done"></div><div class="step done"></div><div class="step done"></div><div class="step done"></div><div class="step active"></div></div>'
      +'<div class="card" style="text-align:center;padding:40px"><div class="spin"></div><div style="font-size:13px;color:#888">Procesando firma y generando certificado...</div></div>');
    try{
      var r=await fetch("/api/firma",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({action:"sign",token:TOKEN,signature_image:sigData,user_agent:navigator.userAgent.substring(0,150),lat:gps?gps.lat:null,lng:gps?gps.lng:null,id_type:"CC",id_number:pending.signer_id_number||""})});
      var d=await r.json();
      if(d.ok)showSuccess(d);
      else R('<div class="card" style="text-align:center"><h2>Error</h2><div class="sub">'+(d.error||"")+'</div><button class="btn bk" onclick="APP.showStep4()">Reintentar</button></div>');
    }catch(e){R('<div class="card"><h2>Error</h2><div class="sub">'+e.message+'</div><button class="btn bk" onclick="APP.showStep4()">Reintentar</button></div>');}
  }

  function showSuccess(data){
    R('<div class="step-bar"><div class="step done"></div><div class="step done"></div><div class="step done"></div><div class="step done"></div><div class="step done"></div></div>'
      +'<div class="card" style="text-align:center">'
      +'<div style="font-size:56px;margin-bottom:12px">\u2705</div>'
      +'<h2 style="color:#059669">Documento firmado exitosamente</h2>'
      +'<div class="sub">Su firma ha sido registrada y certificada</div>'
      +'<div class="cert-box">'
      +'<div style="font-size:10px;color:#059669;font-weight:600;letter-spacing:1px">CERTIFICADO DE FIRMA DIGITAL</div>'
      +'<div class="cert-code">'+data.certificate_code+'</div>'
      +'<div style="font-size:11px;color:#666">Verificable en:</div>'
      +'<div style="font-size:11px;color:#1D4ED8;word-break:break-all">'+data.verification_url+'</div></div>'
      +'<div style="font-size:12px;color:#888;margin-bottom:16px;text-align:left">'
      +'<strong>Documento:</strong> '+pending.doc_code+'<br/>'
      +'<strong>T\u00edtulo:</strong> '+pending.doc_title+'<br/>'
      +'<strong>Firmante:</strong> '+pending.signer_name+'<br/>'
      +'<strong>Fecha:</strong> '+new Date(data.signed_at).toLocaleString("es-CO")+'<br/>'
      +'<strong>Verificaci\u00f3n:</strong> Email OTP + GPS + IP + SHA-256</div>'
      +'<button class="btn bk" onclick="window.open(\''+data.verification_url+'\')">Verificar certificado \u2192</button>'
      +'<div class="legal">Este certificado acredita que el firmante ha suscrito el documento de forma electr\u00f3nica con verificaci\u00f3n de identidad por c\u00f3digo OTP. '
