<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>Firma Digital · Habitaris</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',Arial,sans-serif;background:#F0EEE9;min-height:100vh;color:#111}
.hdr{background:#111;padding:16px 20px;text-align:center}
.hdr img{height:28px}
.wrap{max-width:700px;margin:0 auto;padding:20px}
.card{background:#fff;border-radius:12px;padding:24px;box-shadow:0 1px 4px rgba(0,0,0,.06);margin-bottom:16px}
h2{font-size:18px;font-weight:700;margin-bottom:4px}
.sub{font-size:12px;color:#888;margin-bottom:20px}
.info-row{display:flex;justify-content:space-between;font-size:13px;padding:8px 0;border-bottom:1px solid #F3F4F6}
.info-row:last-child{border:none}
.info-label{color:#888;font-weight:600;font-size:11px;text-transform:uppercase}
.info-value{color:#111;font-weight:500;text-align:right}
.pdf-viewer{border:1px solid #DDD;border-radius:8px;overflow:hidden;background:#666;margin-bottom:16px;position:relative}
.pdf-scroll{max-height:500px;overflow-y:auto;padding:8px;display:flex;flex-direction:column;align-items:center;gap:8px}
.pdf-scroll canvas{max-width:100%;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.pdf-bar{background:#333;color:#fff;padding:8px 16px;display:flex;justify-content:space-between;align-items:center;font-size:12px}
.pdf-progress{height:3px;background:#444;border-radius:2px;overflow:hidden;margin-top:4px}
.pdf-progress-fill{height:100%;background:#059669;transition:width .3s}
.read-gate{background:#FEF3C7;border:1px solid #D97706;border-radius:8px;padding:14px;margin-bottom:16px;font-size:12px;color:#92400E;text-align:center}
.check-row{display:flex;align-items:start;gap:10px;margin-bottom:16px;padding:14px;border:1px solid #DDD;border-radius:8px}
.check-row input{width:18px;height:18px;margin-top:2px;flex-shrink:0}
.check-row label{font-size:13px;color:#333;cursor:pointer;line-height:1.4}
.pad-area{border:2px dashed #DDD;border-radius:12px;background:#FAFAFA;position:relative;margin-bottom:16px;touch-action:none}
.pad-area canvas{display:block;border-radius:10px;cursor:crosshair}
.pad-hint{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#CCC;font-size:14px;pointer-events:none}
.btn{width:100%;padding:14px;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;text-align:center;margin-bottom:8px}
.bk{background:#111;color:#fff}
.bg{background:#059669;color:#fff}
.ghost{background:none;color:#888;font-size:12px;padding:8px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;width:100%}
.btn:disabled{opacity:.4;cursor:not-allowed}
.spin{width:24px;height:24px;border:3px solid #E0E0E0;border-top-color:#111;border-radius:50%;animation:sp 1s linear infinite;margin:0 auto 8px}
@keyframes sp{to{transform:rotate(360deg)}}
.cert-box{background:#DCFCE7;border:1px solid #059669;border-radius:12px;padding:20px;text-align:center;margin-bottom:16px}
.cert-code{font-family:monospace;font-size:16px;font-weight:700;color:#059669;margin:8px 0}
.legal{font-size:9px;color:#999;line-height:1.5;margin-top:16px;padding-top:12px;border-top:1px solid #F3F4F6}
.step-bar{display:flex;gap:4px;margin-bottom:20px}
.step{flex:1;height:4px;border-radius:2px;background:#E0E0E0}
.step.done{background:#059669}
.step.active{background:#111}
</style>
</head>
<body>
<div class="hdr"><img src="/logo-habitaris-blanco.png" alt="Habitaris"/></div>
<div class="wrap" id="app"><div style="text-align:center;padding:40px"><div class="spin"></div></div></div>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
(function(){
  var P=new URLSearchParams(window.location.search);
  var TOKEN=P.get("token")||"";
  var pending=null, sigData=null, gps=null;
  var canvas,ctx,drawing=false,hasDrawn=false;
  var scrolledToEnd=false, checked=false;

  function R(h){document.getElementById("app").innerHTML=h;}

  if(navigator.geolocation){navigator.geolocation.getCurrentPosition(function(p){gps={lat:p.coords.latitude,lng:p.coords.longitude};},function(){},{enableHighAccuracy:true,timeout:15000});}

  async function load(){
    if(!TOKEN){R('<div class="card" style="text-align:center"><h2>Enlace inv\u00e1lido</h2><div class="sub">No se encontr\u00f3 un token de firma.</div></div>');return;}
    try{
      var r=await fetch("/api/firma?token="+TOKEN);
      var d=await r.json();
      if(!d.ok||!d.data){R('<div class="card" style="text-align:center"><h2>Enlace inv\u00e1lido</h2><div class="sub">Este enlace no existe o ha expirado.</div></div>');return;}
      pending=d.data;
      if(pending.status==="signed"){showAlready();return;}
      if(pending.status==="expired"){R('<div class="card" style="text-align:center"><h2>Enlace expirado</h2></div>');return;}
      showStep1();
    }catch(e){R('<div class="card"><h2>Error</h2><div class="sub">'+e.message+'</div></div>');}
  }

  function showAlready(){
    R('<div class="card" style="text-align:center"><div style="font-size:48px;margin-bottom:12px">\u2705</div><h2>Documento ya firmado</h2><div class="sub">Este documento ya fue firmado anteriormente.</div></div>');
  }

  // STEP 1: Info del documento
  function showStep1(){
    R('<div class="step-bar"><div class="step done"></div><div class="step active"></div><div class="step"></div><div class="step"></div></div>'
      +'<div class="card">'
      +'<div style="text-align:center;margin-bottom:20px"><div style="font-size:40px;margin-bottom:8px">\ud83d\udcc4</div>'
      +'<h2>Firma de documento</h2>'
      +'<div class="sub">Revise la informaci\u00f3n y proceda a leer el documento</div></div>'
      +'<div class="info-row"><span class="info-label">Documento</span><span class="info-value">'+pending.doc_code+'</span></div>'
      +'<div class="info-row"><span class="info-label">T\u00edtulo</span><span class="info-value">'+pending.doc_title+'</span></div>'
      +'<div class="info-row"><span class="info-label">Firmante</span><span class="info-value">'+pending.signer_name+'</span></div>'
      +'<div class="info-row"><span class="info-label">Rol</span><span class="info-value">'+pending.signer_role+'</span></div>'
      +'<div class="info-row"><span class="info-label">Email</span><span class="info-value">'+(pending.signer_email||"")+'</span></div>'
      +'<div style="background:#EFF6FF;border:1px solid #1D4ED8;border-radius:8px;padding:14px;font-size:12px;color:#1E40AF;margin:16px 0">'
      +'<strong>Importante:</strong> Deber\u00e1 leer el documento completo antes de poder firmar. Su firma tendr\u00e1 validez legal conforme a la Ley 527/1999 (Colombia) y el Reglamento eIDAS (UE).</div>'
      +'<button class="btn bk" onclick="APP.showStep2()">Leer documento \u2192</button>'
      +'</div>');
  }

  // STEP 2: Leer el PDF
  function showStep2(){
    scrolledToEnd=false;
    R('<div class="step-bar"><div class="step done"></div><div class="step done"></div><div class="step active"></div><div class="step"></div></div>'
      +'<div class="card" style="padding:16px">'
      +'<div class="pdf-bar"><span>\ud83d\udcc4 '+pending.doc_code+' \u2014 '+pending.doc_title+'</span><span id="pageInfo"></span></div>'
      +'<div class="pdf-viewer"><div class="pdf-scroll" id="pdfScroll"></div></div>'
      +'<div class="pdf-progress"><div class="pdf-progress-fill" id="progFill" style="width:0%"></div></div>'
      +'<div id="readGate" class="read-gate">\u2b07\ufe0f Despl\u00e1cese hasta el final del documento para continuar</div>'
      +'<div id="checkArea" style="display:none">'
      +'<div class="check-row"><input type="checkbox" id="readCheck" onchange="APP.onCheck()"/><label for="readCheck">He le\u00eddo \u00edntegramente el documento <strong>'+pending.doc_code+'</strong> y manifiesto mi conformidad con su contenido.</label></div>'
      +'<button class="btn bk" id="toSignBtn" disabled onclick="APP.showStep3()">Proceder a firmar \u2192</button>'
      +'</div>'
      +'</div>');
    renderPDF();
  }

  async function renderPDF(){
    var container=document.getElementById("pdfScroll");
    // If we have a PDF URL, load it. Otherwise show placeholder
    if(pending.doc_pdf_url && pending.doc_pdf_url.startsWith("data:")){
      try{
        var pdfData=atob(pending.doc_pdf_url.split(",")[1]);
        var pdf=await pdfjsLib.getDocument({data:pdfData}).promise;
        renderPages(pdf,container);
        return;
      }catch(e){console.error(e);}
    }
    // Placeholder: show document info as styled HTML
    container.innerHTML='<div style="background:#fff;padding:40px;max-width:600px;width:100%;min-height:800px">'
      +'<div style="text-align:center;border-bottom:2px solid #111;padding-bottom:16px;margin-bottom:20px">'
      +'<div style="font-weight:700;font-size:18px;letter-spacing:2px">HABITARIS</div>'
      +'<div style="font-size:10px;color:#888">ARQUITECTURA \xb7 INTERIORISMO</div></div>'
      +'<div style="text-align:center;margin-bottom:24px"><div style="font-size:16px;font-weight:700">'+pending.doc_title+'</div>'
      +'<div style="font-size:11px;color:#888">'+pending.doc_code+'</div></div>'
      +'<div style="font-size:12px;color:#333;line-height:1.8">'
      +'<p>Este documento ha sido generado por Habitaris Suite y est\u00e1 pendiente de firma digital.</p>'
      +'<p style="margin-top:12px"><strong>Firmante:</strong> '+pending.signer_name+'</p>'
      +'<p><strong>Rol:</strong> '+pending.signer_role+'</p>'
      +'<p><strong>Documento de identidad:</strong> '+(pending.signer_id_number||"")+'</p>'
      +'<p style="margin-top:20px">El contenido completo del documento ha sido revisado y aprobado por las partes. Al firmar, el firmante acepta \u00edntegramente las condiciones establecidas en el documento original.</p>'
      +'<p style="margin-top:20px;padding-top:16px;border-top:1px solid #eee;font-size:10px;color:#999">Documento protegido con SHA-256. Verificable en suite.habitaris.co/verificar</p>'
      +'</div></div>';
    // Monitor scroll
    var sc=document.getElementById("pdfScroll");
    sc.style.maxHeight="500px";
    sc.addEventListener("scroll",function(){
      var pct=sc.scrollTop/(sc.scrollHeight-sc.clientHeight)*100;
      document.getElementById("progFill").style.width=Math.min(pct,100)+"%";
      if(pct>90&&!scrolledToEnd){
        scrolledToEnd=true;
        document.getElementById("readGate").style.display="none";
        document.getElementById("checkArea").style.display="block";
      }
    });
  }

  async function renderPages(pdf,container){
    var totalPages=pdf.numPages;
    document.getElementById("pageInfo").textContent=totalPages+" p\u00e1g.";
    for(var i=1;i<=totalPages;i++){
      var page=await pdf.getPage(i);
      var viewport=page.getViewport({scale:1.5});
      var cv=document.createElement("canvas");
      cv.width=viewport.width;cv.height=viewport.height;
      cv.style.maxWidth="100%";cv.style.height="auto";
      container.appendChild(cv);
      await page.render({canvasContext:cv.getContext("2d"),viewport:viewport}).promise;
    }
    // Monitor scroll
    var sc=document.getElementById("pdfScroll");
    sc.style.maxHeight="500px";
    sc.addEventListener("scroll",function(){
      var pct=sc.scrollTop/(sc.scrollHeight-sc.clientHeight)*100;
      document.getElementById("progFill").style.width=Math.min(pct,100)+"%";
      if(pct>90&&!scrolledToEnd){
        scrolledToEnd=true;
        document.getElementById("readGate").style.display="none";
        document.getElementById("checkArea").style.display="block";
      }
    });
  }

  function onCheck(){
    checked=document.getElementById("readCheck").checked;
    document.getElementById("toSignBtn").disabled=!checked;
  }

  // STEP 3: Firmar
  function showStep3(){
    R('<div class="step-bar"><div class="step done"></div><div class="step done"></div><div class="step done"></div><div class="step active"></div></div>'
      +'<div class="card">'
      +'<h2 style="text-align:center">\u270d\ufe0f Su firma</h2>'
      +'<div class="sub" style="text-align:center">Firme con el dedo o el mouse dentro del recuadro</div>'
      +'<div class="pad-area" id="padArea"><canvas id="sigCanvas" width="500" height="200"></canvas><div class="pad-hint" id="padHint">Firme aqu\u00ed</div></div>'
      +(gps?'<div style="font-size:10px;color:#888;background:#F5F5F5;border-radius:6px;padding:6px 10px;margin-bottom:12px">\ud83d\udccd Ubicaci\u00f3n capturada: '+gps.lat.toFixed(4)+', '+gps.lng.toFixed(4)+'</div>':'')
      +'<button class="btn bg" id="signBtn" disabled onclick="APP.submit()">Firmar documento \u2192</button>'
      +'<button class="ghost" onclick="APP.clearPad()">Borrar firma</button>'
      +'<button class="ghost" onclick="APP.showStep2()">\u2190 Volver al documento</button>'
      +'<div class="legal">Al firmar, se registrar\u00e1: su direcci\u00f3n IP, dispositivo, ubicaci\u00f3n GPS y fecha/hora UTC. '
      +'El documento firmado recibir\u00e1 un certificado \u00fanico verificable en suite.habitaris.co/verificar. '
      +'Validez legal: Ley 527/1999 (Colombia) \xb7 Reglamento (UE) 910/2014 (eIDAS).</div>'
      +'</div>');
    initCanvas();
  }

  function initCanvas(){
    canvas=document.getElementById("sigCanvas");
    ctx=canvas.getContext("2d");
    ctx.strokeStyle="#111";ctx.lineWidth=2.5;ctx.lineCap="round";ctx.lineJoin="round";
    hasDrawn=false;drawing=false;
    function gp(e){var r=canvas.getBoundingClientRect();var x,y;if(e.touches){x=e.touches[0].clientX-r.left;y=e.touches[0].clientY-r.top;}else{x=e.clientX-r.left;y=e.clientY-r.top;}var sx=canvas.width/r.width;var sy=canvas.height/r.height;return{x:x*sx,y:y*sy};}
    function s(e){e.preventDefault();drawing=true;var p=gp(e);ctx.beginPath();ctx.moveTo(p.x,p.y);}
    function m(e){e.preventDefault();if(!drawing)return;var p=gp(e);ctx.lineTo(p.x,p.y);ctx.stroke();hasDrawn=true;document.getElementById("padHint").style.display="none";document.getElementById("signBtn").disabled=false;}
    function en(e){e.preventDefault();drawing=false;}
    canvas.addEventListener("mousedown",s);canvas.addEventListener("mousemove",m);canvas.addEventListener("mouseup",en);canvas.addEventListener("mouseleave",en);
    canvas.addEventListener("touchstart",s);canvas.addEventListener("touchmove",m);canvas.addEventListener("touchend",en);
  }

  function clearPad(){if(ctx){ctx.clearRect(0,0,canvas.width,canvas.height);hasDrawn=false;document.getElementById("padHint").style.display="block";document.getElementById("signBtn").disabled=true;}}

  async function submit(){
    if(!hasDrawn){alert("Debe firmar antes de continuar.");return;}
    sigData=canvas.toDataURL("image/png");
    R('<div class="card" style="text-align:center;padding:40px"><div class="spin"></div><div style="font-size:13px;color:#888">Procesando firma y generando certificado...</div></div>');
    try{
      var r=await fetch("/api/firma",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({action:"sign",token:TOKEN,signature_image:sigData,user_agent:navigator.userAgent.substring(0,150),lat:gps?gps.lat:null,lng:gps?gps.lng:null,id_type:"CC",id_number:pending.signer_id_number||""})});
      var d=await r.json();
      if(d.ok){showSuccess(d);}
      else{R('<div class="card" style="text-align:center"><h2>Error</h2><div class="sub">'+(d.error||"Error desconocido")+'</div><button class="btn bk" onclick="APP.showStep3()">Reintentar</button></div>');}
    }catch(e){R('<div class="card" style="text-align:center"><h2>Error</h2><div class="sub">'+e.message+'</div><button class="btn bk" onclick="APP.showStep3()">Reintentar</button></div>');}
  }

  function showSuccess(data){
    R('<div class="step-bar"><div class="step done"></div><div class="step done"></div><div class="step done"></div><div class="step done"></div></div>'
      +'<div class="card" style="text-align:center">'
      +'<div style="font-size:56px;margin-bottom:12px">\u2705</div>'
      +'<h2 style="color:#059669">Documento firmado exitosamente</h2>'
      +'<div class="sub">Su firma ha sido registrada y certificada</div>'
      +'<div class="cert-box">'
      +'<div style="font-size:10px;color:#059669;font-weight:600;letter-spacing:1px">CERTIFICADO DE FIRMA DIGITAL</div>'
      +'<div class="cert-code">'+data.certificate_code+'</div>'
      +'<div style="font-size:11px;color:#666">Verificable en:</div>'
      +'<div style="font-size:11px;color:#1D4ED8;word-break:break-all">'+data.verification_url+'</div></div>'
      +'<div style="font-size:12px;color:#888;margin-bottom:16px;text-align:left">'
      +'<strong>Documento:</strong> '+pending.doc_code+'<br/>'
      +'<strong>T\u00edtulo:</strong> '+pending.doc_title+'<br/>'
      +'<strong>Firmante:</strong> '+pending.signer_name+'<br/>'
      +'<strong>Fecha:</strong> '+new Date(data.signed_at).toLocaleString("es-CO")+'</div>'
      +'<div class="legal">Este certificado acredita que el firmante ha suscrito el documento de forma electr\u00f3nica. '
      +'La firma incluye: hash SHA-256, direcci\u00f3n IP, dispositivo, ubicaci\u00f3n GPS y marca temporal UTC. '
      +'Cualquier persona puede verificar la autenticidad en la URL indicada. '
      +'Validez legal: Ley 527/1999 (Colombia) \xb7 Reglamento (UE) 910/2014 (eIDAS).</div>'
      +'</div>');
  }

  window.APP={showStep1:showStep1,showStep2:showStep2,showStep3:showStep3,clearPad:clearPad,submit:submit,onCheck:onCheck};
  load();
})();
</script>
</body>
</html>
